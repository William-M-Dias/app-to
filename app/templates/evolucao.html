<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Evolução Diária | APP-TO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans pb-32" x-data="formEvolucao({{ paciente_id }})" x-init="carregarHistorico()">

    <header class="bg-emerald-600 text-white p-4 sticky top-0 z-50 shadow-lg">
        <div class="flex items-center gap-3">
            <a :href="'/paciente/' + pacienteId" class="p-1 hover:bg-white/20 rounded-full transition"> 
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg> 
            </a>
            <h1 class="text-xl font-black uppercase tracking-wide">Evolução Diária</h1>
        </div>
    </header>

    <main class="p-4 space-y-6">
        
        <div class="bg-white rounded-3xl p-5 shadow-sm border border-slate-200 space-y-4">
            <h2 class="font-bold text-emerald-800 border-b pb-2">Registo da Sessão</h2>
            
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase">Data da Sessão</label>
                    <input type="date" x-model="form.data_hora" class="w-full mt-1 p-2 bg-slate-50 rounded-xl border-none focus:ring-emerald-500 text-sm">
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase">Status</label>
                    <select x-model="form.status" class="w-full mt-1 p-2 bg-slate-50 rounded-xl border-none focus:ring-emerald-500 text-sm">
                        <option>Realizado</option><option>Faltou</option><option>Cancelado</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="text-xs font-bold text-slate-500 uppercase">Evolução Clínica (Texto Livre)</label>
                <textarea x-model="form.evolucao_texto" rows="3" placeholder="Resumo do que foi trabalhado hoje..." class="w-full mt-1 p-3 bg-slate-50 rounded-xl border-none focus:ring-emerald-500 text-sm"></textarea>
            </div>

            <div class="bg-emerald-50 p-3 rounded-2xl border border-emerald-100 space-y-2">
                <label class="text-xs font-black text-emerald-800 uppercase">Micro-Metas Alcançadas Hoje</label>
                <div class="flex flex-col gap-2">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" x-model="form.micro_metas.autocuidado" class="w-4 h-4 accent-emerald-600">
                        <span class="text-xs font-bold text-emerald-900">Avanço em Autocuidado (Ex: Alimentação/Vestuário)</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" x-model="form.micro_metas.mobilidade" class="w-4 h-4 accent-emerald-600">
                        <span class="text-xs font-bold text-emerald-900">Avanço em Mobilidade e Coordenação</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" x-model="form.micro_metas.funcao_social" class="w-4 h-4 accent-emerald-600">
                        <span class="text-xs font-bold text-emerald-900">Avanço em Regulação e Função Social</span>
                    </label>
                </div>
            </div>

            <button @click="salvar" class="w-full bg-emerald-600 text-white font-black py-3 rounded-xl shadow-md active:scale-95 transition-transform uppercase text-sm">
                Guardar Evolução
            </button>
        </div>

        <div>
            <h3 class="font-black text-slate-700 mb-3 px-1 uppercase text-sm">Histórico de Sessões</h3>
            <div class="space-y-3">
                <template x-for="ev in historico" :key="ev.id">
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-xs font-black text-emerald-600" x-text="ev.data_hora"></span>
                            <span class="text-[10px] bg-slate-100 text-slate-600 px-2 py-1 rounded-lg font-bold uppercase" x-text="ev.status"></span>
                        </div>
                        <p class="text-sm text-slate-600 leading-relaxed" x-text="ev.evolucao_texto || 'Sem descrição textual.'"></p>
                        
                        <div class="flex gap-1 mt-3 flex-wrap">
                            <template x-if="ev.micro_metas.autocuidado"><span class="bg-blue-100 text-blue-700 text-[9px] font-bold px-2 py-0.5 rounded-full">Autocuidado</span></template>
                            <template x-if="ev.micro_metas.mobilidade"><span class="bg-orange-100 text-orange-700 text-[9px] font-bold px-2 py-0.5 rounded-full">Mobilidade</span></template>
                            <template x-if="ev.micro_metas.funcao_social"><span class="bg-purple-100 text-purple-700 text-[9px] font-bold px-2 py-0.5 rounded-full">Função Social</span></template>
                        </div>
                    </div>
                </template>
                <template x-if="historico.length === 0">
                    <div class="text-center p-6 border-2 border-dashed rounded-2xl text-slate-400 text-xs font-bold">Nenhuma sessão registada ainda.</div>
                </template>
            </div>
        </div>

    </main>

    <script>
        function formEvolucao(id) {
            return {
                pacienteId: id,
                historico: [],
                form: {
                    data_hora: new Date().toISOString().split('T')[0],
                    tipo_sessao: 'Intervenção de Rotina',
                    status: 'Realizado',
                    evolucao_texto: '',
                    micro_metas: { autocuidado: false, mobilidade: false, funcao_social: false }
                },
                carregarHistorico() {
                    fetch('/api/consultas/paciente/' + this.pacienteId)
                        .then(res => res.json())
                        .then(data => this.historico = data);
                },
                salvar() {
                    const payload = { ...this.form, paciente_id: this.pacienteId };
                    fetch('/api/consultas/', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    }).then(res => res.json()).then(data => {
                        if(data.mensagem) {
                            this.form.evolucao_texto = '';
                            this.form.micro_metas = { autocuidado: false, mobilidade: false, funcao_social: false };
                            this.carregarHistorico();
                        } else { alert('Erro: ' + data.erro); }
                    });
                }
            }
        }
    </script>
</body>
</html>
