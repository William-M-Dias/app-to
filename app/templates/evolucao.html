<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Evolução Diária (GAS) | APP-TO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { 
                extend: { 
                    fontFamily: { sans: ['Nunito', 'sans-serif'] },
                    colors: { 
                        clinica: { 50: '#f0fdfa', 100: '#ccfbf1', 500: '#14b8a6', 600: '#0d9488', 900: '#134e4a' } 
                    } 
                } 
            }
        }
    </script>
    <style>body { background-color: #f8fafc; overscroll-behavior-y: contain; -webkit-tap-highlight-color: transparent; }</style>
</head>
<body class="text-slate-800 antialiased" x-data="formEvolucao({{ paciente_id }})">

    <div class="max-w-4xl mx-auto min-h-screen bg-white md:shadow-2xl md:shadow-slate-200/50 md:border-x border-slate-100 relative pb-32">
        
        <header class="bg-emerald-600 text-white p-4 sticky top-0 z-50 shadow-md" :class="form.status === 'Agendado' ? 'bg-slate-800' : 'bg-emerald-600'">
            <div class="flex items-center gap-3">
                <a :href="'/paciente/' + pacienteId" class="p-2 -ml-2 hover:bg-white/20 rounded-full transition-colors active:scale-95"> 
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg> 
                </a>
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-white/20 rounded-lg flex items-center justify-center backdrop-blur-sm">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    </div>
                    <h1 class="text-xl font-black uppercase tracking-widest" x-text="form.status === 'Agendado' ? 'Agendar Sessão' : 'Evolução Diária'"></h1>
                </div>
            </div>
        </header>

        <main class="p-4 md:p-6 space-y-6">
            
            <section class="bg-slate-50 p-5 rounded-3xl border border-slate-100 shadow-sm">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5">Data e Hora da Sessão</label>
                        <input type="datetime-local" x-model="form.data_hora" class="w-full p-3 bg-white rounded-xl border border-slate-200 focus:ring-2 focus:ring-emerald-500 outline-none text-sm font-bold text-slate-700 shadow-sm transition-shadow">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5">Tipo</label>
                            <select x-model="form.tipo_sessao" class="w-full p-3 bg-white rounded-xl border border-slate-200 focus:ring-2 focus:ring-emerald-500 outline-none text-sm font-bold text-slate-700 shadow-sm">
                                <option>Intervenção</option>
                                <option>Avaliação</option>
                                <option>Reunião Familiar</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5">Status</label>
                            <select x-model="form.status" class="w-full p-3 bg-white rounded-xl border border-slate-200 focus:ring-2 focus:ring-emerald-500 outline-none text-sm font-bold text-slate-700 shadow-sm">
                                <option>Realizado</option>
                                <option>Agendado</option>
                                <option>Falta</option> <option>Cancelado</option>
                            </select>
                        </div>
                    </div>
                </div>
            </section>

            <section x-show="form.status === 'Realizado'" class="bg-white p-5 rounded-3xl border border-emerald-100 shadow-sm relative overflow-hidden">
                <div class="absolute top-0 right-0 w-32 h-32 bg-emerald-50 rounded-full -mr-10 -mt-10 opacity-50 pointer-events-none"></div>
                
                <div class="relative z-10 mb-5 pb-3 border-b border-slate-50">
                    <h2 class="text-sm font-black text-emerald-800 uppercase flex items-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                        Índice de Resposta Diária (GAS)
                    </h2>
                    <p class="text-xs font-bold text-slate-400 mt-1 leading-snug">Avalie o desempenho do paciente nas micro-metas de hoje comparado ao esperado.</p>
                </div>

                <div class="space-y-6 relative z-10">
                    <template x-for="dominio in [{id: 'autocuidado', nome: 'Autocuidado'}, {id: 'mobilidade', nome: 'Mobilidade'}, {id: 'funcao_social', nome: 'Função Social'}]">
                        <div>
                            <div class="flex justify-between items-end mb-2">
                                <label class="text-[11px] font-black text-slate-600 uppercase tracking-widest" x-text="dominio.nome"></label>
                                <span class="text-[10px] font-bold px-2 py-0.5 rounded-md" 
                                      :class="getLegendaCor(form.micro_metas[dominio.id])" 
                                      x-text="getLegendaTexto(form.micro_metas[dominio.id])"></span>
                            </div>
                            
                            <div class="flex gap-1.5">
                                <template x-for="valor in [-2, -1, 0, 1, 2]">
                                    <button @click="setGas(dominio.id, valor)" 
                                            type="button"
                                            class="flex-1 py-3 rounded-xl border font-black text-sm transition-all duration-200 active:scale-95 flex flex-col items-center justify-center gap-0.5"
                                            :class="getGasColor(form.micro_metas[dominio.id], valor)">
                                        <span x-text="valor > 0 ? '+' + valor : valor"></span>
                                    </button>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>
            </section>

            <section x-show="form.status === 'Realizado'" class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm">
                <div class="flex justify-between items-center mb-4">
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest">Atividades Aplicadas (Tags)</label>
                    <span class="text-[10px] font-bold text-emerald-600 bg-emerald-50 px-2 py-1 rounded-lg" x-text="atividadesSelecionadas.length + ' selecionadas'"></span>
                </div>

                <div class="flex flex-wrap gap-2 mb-4" x-show="atividadesSelecionadas.length > 0">
                    <template x-for="ativ in atividadesSelecionadas" :key="ativ">
                        <span class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-clinica-100 text-clinica-700 text-xs font-bold rounded-xl border border-clinica-200">
                            <span x-text="ativ"></span>
                            <button type="button" @click="toggleAtividade(ativ)" class="text-clinica-500 hover:text-clinica-800 focus:outline-none">
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                            </button>
                        </span>
                    </template>
                </div>

                <div class="space-y-2">
                    <template x-for="(categoria, index) in bibliotecaAtividades" :key="index">
                        <div class="border border-slate-100 rounded-2xl overflow-hidden">
                            <button type="button" @click="categoriaAberta = (categoriaAberta === index ? null : index)" 
                                    class="w-full flex items-center justify-between p-3 bg-slate-50 hover:bg-slate-100 transition-colors text-left focus:outline-none">
                                <span class="text-xs font-black text-slate-700 uppercase tracking-wide" x-text="categoria.nome"></span>
                                <svg class="w-4 h-4 text-slate-400 transition-transform" :class="{'rotate-180': categoriaAberta === index}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                            </button>
                            <div x-show="categoriaAberta === index" x-collapse class="bg-white p-3 border-t border-slate-100">
                                <div class="flex flex-wrap gap-1.5">
                                    <template x-for="item in categoria.itens" :key="item.nome">
                                        <div class="flex items-stretch shadow-sm rounded-lg overflow-hidden border transition-colors"
                                             :class="atividadesSelecionadas.includes(item.nome) ? 'border-clinica-500 bg-clinica-600' : 'border-slate-200 bg-white'">
                                            
                                            <button type="button" @click="toggleAtividade(item.nome)" 
                                                    class="px-3 py-1.5 text-[11px] font-bold text-left flex-grow transition-colors focus:outline-none"
                                                    :class="atividadesSelecionadas.includes(item.nome) ? 'text-white' : 'text-slate-600 hover:bg-slate-50'">
                                                <span x-text="item.nome"></span>
                                            </button>

                                            <template x-if="item.descricao">
                                                <button type="button" @click.stop="mostrarDescricao(item.nome, item.descricao)"
                                                        class="px-2.5 flex items-center justify-center border-l transition-colors focus:outline-none"
                                                        :class="atividadesSelecionadas.includes(item.nome) ? 'border-clinica-500 text-clinica-100 hover:text-white hover:bg-clinica-700' : 'border-slate-100 text-slate-400 hover:text-clinica-600 hover:bg-slate-100'"
                                                        title="Ver Significado">
                                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                                </button>
                                            </template>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </section>

            <section class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm">
                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2" x-text="form.status === 'Agendado' ? 'Anotações do Agendamento' : 'Evolução Clínica (Descrição Adicional)'"></label>
                <textarea x-model="form.evolucao_texto" rows="4" placeholder="Adicione detalhes extras da sessão, observações ou planejamento..." class="w-full p-4 bg-slate-50 rounded-2xl border-none focus:ring-2 focus:ring-emerald-500 outline-none text-sm font-semibold text-slate-700 shadow-inner resize-none"></textarea>
            </section>

        </main>

        <div class="fixed bottom-0 max-w-4xl w-full p-4 bg-gradient-to-t from-white via-white to-transparent z-40">
            <button @click="salvar()" :disabled="salvando" 
                    class="w-full text-white font-black py-4 rounded-2xl shadow-xl hover:shadow-2xl active:scale-[0.98] transition-all disabled:opacity-70 flex items-center justify-center gap-2 uppercase tracking-widest"
                    :class="form.status === 'Agendado' ? 'bg-slate-800 hover:bg-slate-900' : 'bg-emerald-600 hover:bg-emerald-700'">
                <svg x-show="salvando" class="animate-spin h-5 w-5 text-white" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                <span x-text="salvando ? 'A Gravar Dados...' : (form.status === 'Agendado' ? 'Confirmar Agendamento' : 'Assinar Prontuário')"></span>
            </button>
        </div>

        <div x-show="modalAjuda.aberto" style="display: none;" class="fixed inset-0 z-[100] overflow-y-auto">
            <div class="flex items-center justify-center min-h-screen px-4 pt-4 pb-20 text-center sm:block sm:p-0">
                <div x-show="modalAjuda.aberto" x-transition.opacity class="fixed inset-0 transition-opacity bg-slate-900/60 backdrop-blur-sm" @click="fecharDescricao()"></div>
                <span class="hidden sm:inline-block sm:align-middle sm:h-screen">&#8203;</span>
                <div x-show="modalAjuda.aberto" x-transition.scale class="inline-block w-full max-w-sm p-6 my-8 overflow-hidden text-left align-middle transition-all transform bg-white shadow-2xl rounded-3xl">
                    <div class="flex items-start justify-between mb-4">
                        <h3 class="text-sm font-black text-emerald-600 uppercase tracking-wide pr-4" x-text="modalAjuda.titulo"></h3>
                        <button @click="fecharDescricao()" class="text-slate-400 hover:text-slate-600 focus:outline-none shrink-0"><svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg></button>
                    </div>
                    <div class="mt-2 bg-slate-50 p-4 rounded-xl border border-slate-100">
                        <p class="text-[13px] font-semibold text-slate-600 leading-relaxed text-justify" x-text="modalAjuda.texto"></p>
                    </div>
                    <div class="mt-6 flex justify-end">
                        <button type="button" @click="fecharDescricao()" class="w-full px-6 py-3 text-xs tracking-widest uppercase font-black text-white transition-colors shadow-md bg-emerald-600 rounded-xl hover:bg-emerald-700 focus:outline-none">Entendi</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>

            const dataIso = agora.toISOString().slice(0, 16);

                salvando: false,
                categoriaAberta: null,

                    texto: ''
                },

                        ]
                    },

                            { nome: '(Avds) Treino escovação de dente', descricao: null },
                            { nome: '(Avds) Treino lavar as mãos', descricao: null },
                            { nome: '(Avds) Treino uso de talher', descricao: null },
                            { nome: '(Avds) Treino de organização', descricao: null },
                            { nome: '(Avds) Treino botões, zíper e velcro', descricao: null },
                            { nome: '(Avds) Treino tênis laço', descricao: null },
                            { nome: '(AIVDS) Culinária (preparo de receitas)', descricao: null },
                            { nome: '(AIVDS) Gestão do dinheiro', descricao: null },
                            { nome: '(AIVDS) Lavar louça', descricao: null },
                            { nome: '(AIVDS) Orientação de saúde/segurança', descricao: null },
                            { nome: '(AIVDS) fazer compras e Deslocamento', descricao: null },
                            { nome: '(AIVDS) Noção de Perigos', descricao: null },
                            { nome: '(AIVDS) Noção de Localização (endereço)', descricao: null }
                        ]
                    }
                ],

                mostrarDescricao(titulo, texto) {
                    this.modalAjuda.titulo = titulo;
                    this.modalAjuda.texto = texto;
                    this.modalAjuda.aberto = true;
                },

                fecharDescricao() {
                    this.modalAjuda.aberto = false;
                },

                toggleAtividade(atividade) {
                    const index = this.atividadesSelecionadas.indexOf(atividade);
                    if (index > -1) {
                        this.atividadesSelecionadas.splice(index, 1);
                    } else {
                        this.atividadesSelecionadas.push(atividade);
                    }
                },

                setGas(dominio, valor) {
                    if(this.form.micro_metas[dominio] === valor) {
                        this.form.micro_metas[dominio] = null;
                    } else {
                        this.form.micro_metas[dominio] = valor;
                    }
                },

                getGasColor(selecionado, botaoValor) {
                    if (selecionado !== botaoValor) return 'bg-white text-slate-400 border-slate-200 hover:bg-slate-50';
                    if (botaoValor === -2) return 'bg-rose-500 text-white border-rose-600 shadow-inner scale-105';
                    if (botaoValor === -1) return 'bg-orange-400 text-white border-orange-500 shadow-inner scale-105';
                    if (botaoValor === 0) return 'bg-slate-500 text-white border-slate-600 shadow-inner scale-105';
                    if (botaoValor === 1) return 'bg-clinica-400 text-white border-clinica-500 shadow-inner scale-105';
                    if (botaoValor === 2) return 'bg-clinica-600 text-white border-clinica-700 shadow-inner scale-105';
                },

                getLegendaTexto(valor) {
                    if (valor === -2) return 'Pior que o esperado (Recusa)';
                    if (valor === -1) return 'Abaixo (Muita ajuda)';
                    if (valor === 0) return 'O esperado hoje';
                    if (valor === 1) return 'Acima (Pouca ajuda)';
                    if (valor === 2) return 'Muito acima (Autónomo)';
                    return 'Não avaliado hoje';
                },

                getLegendaCor(valor) {
                    if (valor === -2) return 'bg-rose-100 text-rose-700';
                    if (valor === -1) return 'bg-orange-100 text-orange-700';
                    if (valor === 0) return 'bg-slate-200 text-slate-700';
                    if (valor === 1) return 'bg-clinica-100 text-clinica-700';
                    if (valor === 2) return 'bg-clinica-100 text-clinica-800';
                    return 'bg-slate-100 text-slate-400';
                },

                salvar() {
                    this.salvando = true;
                    const payload = { ...this.form };
                    payload.data_hora = payload.data_hora.replace('T', ' ');
                    
                    if(payload.status === 'Realizado') {
                        payload.micro_metas.atividades = this.atividadesSelecionadas;
                        
                        // A MÁGICA DA VALIDAÇÃO: Remove tudo que for null, undefined ou array vazio
                        const metasLimpas = Object.fromEntries(
                            Object.entries(payload.micro_metas).filter(([chave, valor]) => {
                                if (valor === null || valor === undefined) return false;
                                if (Array.isArray(valor) && valor.length === 0) return false;
                                return true;
                            })
                        );
                        payload.micro_metas = metasLimpas;
                        
                    } else {
                        payload.micro_metas = {}; // Se não realizou, buraco negro vazio.
                    }

                    // Console.log para auditoria do JSON limpo antes do envio ao servidor
                    console.log("🚀 DADOS JSONB VALIDADOS:", JSON.stringify(payload.micro_metas));

                    fetch('/api/consultas/', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    })
                    .then(res => {
                        if (!res.ok) throw new Error('Falha ao salvar a Evolução');
                        return res.json();
                    })
                    .then(data => {
                        this.salvando = false;
                        window.location.href = '/paciente/' + this.pacienteId;
                    })
                    .catch(err => {
                        console.error(err);
                        alert('Erro ao guardar evolução. Verifique a ligação à internet.');
                        this.salvando = false;
                    });
                }
            }
        }
    </script>
</body>
</html>
