<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Interativa | APP-TO</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>
    
    <script>
        tailwind.config = {
            theme: { 
                extend: { 
                    fontFamily: { sans: ['Nunito', 'sans-serif'] },
                    colors: { 
                        clinica: { 50: '#f0fdfa', 100: '#ccfbf1', 500: '#14b8a6', 600: '#0d9488', 900: '#134e4a' } 
                    } 
                } 
            }
        }
    </script>
    
    <style>
        body { font-family: 'Nunito', sans-serif; background-color: #f8fafc; }
        .fc-theme-standard .fc-scrollgrid { border: none !important; }
        .fc-theme-standard td, .fc-theme-standard th { border-color: #f1f5f9; }
        .fc-col-header-cell-cushion { font-weight: 800; color: #475569; text-transform: uppercase; font-size: 12px; padding: 12px !important; }
        
        /* O SEGREDO DEFINITIVO PARA NÃO CORTAR OS NOMES NO CALENDÁRIO */
        .fc-event { 
            border-radius: 8px; 
            border: none; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); 
            cursor: pointer; 
            transition: transform 0.2s;
            padding: 4px !important;
        }
        .fc-event:hover { transform: scale(1.02); }
        
        /* Força a quebra de linha em vez de esconder o texto */
        .fc-event-main {
            white-space: normal !important;
            word-wrap: break-word !important;
            overflow: hidden !important;
            display: flex !important;
            flex-direction: column !important;
        }
        .fc-event-time {
            font-size: 10px !important;
            font-weight: 900 !important;
            margin-bottom: 2px !important;
            opacity: 0.9;
        }
        .fc-event-title {
            font-size: 12px !important;
            font-weight: 800 !important;
            white-space: normal !important;
            word-break: break-word !important;
            line-height: 1.2 !important;
        }
        .fc-v-event .fc-event-main-frame {
            display: block !important; 
        }

        .fc-timegrid-slot-label-cushion { font-weight: 800; color: #94a3b8; font-size: 11px; }
        .fc-button-primary {
            background-color: #0d9488 !important;
            border-color: #0d9488 !important;
            font-weight: 800 !important;
            text-transform: uppercase !important;
            border-radius: 8px !important;
            padding: 8px 16px !important;
            font-size: 12px !important;
            box-shadow: 0 4px 6px -1px rgba(13, 148, 136, 0.2) !important;
        }
        .fc-button-primary:hover {
            background-color: #0f766e !important;
            border-color: #0f766e !important;
        }
        .fc-button-active {
            background-color: #115e59 !important;
            border-color: #115e59 !important;
        }
        .fc-toolbar-title { font-weight: 900 !important; color: #1e293b !important; text-transform: uppercase; font-size: 1.25rem !important; }
    </style>
</head>
<body class="text-slate-800 antialiased h-screen flex flex-col">

    <header class="bg-clinica-600 text-white p-4 shadow-lg shrink-0 relative z-20">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-3 w-full md:w-auto">
                <a href="/" class="p-2 -ml-2 hover:bg-white/20 rounded-full transition-colors active:scale-95">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                </a>
                <h1 class="text-xl font-black uppercase tracking-widest flex items-center gap-2">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    Quadro Clínico
                </h1>
            </div>
            
            <div class="flex items-center justify-between w-full md:w-auto gap-4">
                <select id="filtro-profissional" class="bg-clinica-900 border border-clinica-500 text-white text-xs font-bold rounded-lg px-4 py-2 outline-none focus:ring-2 focus:ring-clinica-300 w-full md:w-auto shadow-inner">
                    <option value="">Clínica Completa (Todos)</option>
                    <option value="1">Dra. Edna Nogueira (T.O.)</option>
                    <option value="2">Dr. Profissional 2</option>
                    <option value="3">Dra. Profissional 3</option>
                </select>

                <div class="hidden lg:flex gap-4 text-[10px] font-black uppercase tracking-widest bg-black/20 px-4 py-2 rounded-full shrink-0">
                    <span class="flex items-center gap-2"><div class="w-3 h-3 rounded-full bg-teal-600 shadow-sm border border-white/20"></div> Única</span>
                    <span class="flex items-center gap-2"><div class="w-3 h-3 rounded-full bg-purple-600 shadow-sm border border-white/20"></div> Recorrente</span>
                    <span class="flex items-center gap-2"><div class="w-3 h-3 rounded-full bg-emerald-500 shadow-sm border border-white/20"></div> Realizada</span>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-grow p-4 md:p-6 overflow-hidden max-w-7xl mx-auto w-full flex flex-col relative z-10">
        <div class="bg-white p-6 rounded-3xl shadow-xl border border-slate-100 h-full flex flex-col relative">
            <div id='calendar' class="flex-grow"></div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var calendarEl = document.getElementById('calendar');
            var selectFiltro = document.getElementById('filtro-profissional');
            
            var isMobile = window.innerWidth < 768;
            
            var calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: isMobile ? 'timeGridDay' : 'timeGridWeek',
                locale: 'pt-br',
                dayMinWidth: 120, // <--- MÁGICA DE VERDADE: Garante no mínimo 120px de largura por dia (cria scroll horizontal se faltar tela)
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: isMobile ? 'timeGridDay,timeGridWeek,listWeek' : 'timeGridWeek,timeGridDay,listWeek'
                },
                slotMinTime: '07:00:00',
                slotMaxTime: '20:00:00',
                allDaySlot: false,
                editable: true,
                selectable: true,
                eventDurationEditable: true, 
                
                events: function(info, successCallback, failureCallback) {
                    var profId = selectFiltro.value;
                    var url = '/api/consultas/calendario?start=' + info.startStr + '&end=' + info.endStr;
                    
                    if (profId) {
                        url += '&profissional_id=' + profId;
                    }

                    fetch(url)
                        .then(res => res.json())
                        .then(data => successCallback(data))
                        .catch(err => failureCallback(err));
                },
                
                eventClick: function(info) {
                    if (info.event.extendedProps.paciente_id) {
                        window.location.href = '/paciente/' + info.event.extendedProps.paciente_id;
                    }
                },
                
                eventDrop: function(info) {
                    if (!confirm(`Confirmar a mudança de horário de ${info.event.title}?`)) {
                        info.revert();
                        return;
                    }
                    fetch(`/api/consultas/${info.event.id}/mover`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            nova_data: info.event.startStr,
                            nova_data_fim: info.event.endStr
                        })
                    }).then(res => {
                        if (!res.ok) { alert("Erro ao salvar mudança no banco."); info.revert(); }
                    }).catch(err => { alert("Falha de conexão."); info.revert(); });
                },
                
                eventResize: function(info) {
                     fetch(`/api/consultas/${info.event.id}/mover`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            nova_data: info.event.startStr,
                            nova_data_fim: info.event.endStr
                        })
                    }).then(res => {
                        if (!res.ok) { alert("Erro ao salvar mudança de tempo."); info.revert(); }
                    });
                }
            });
            
            calendar.render();

            selectFiltro.addEventListener('change', function() {
                calendar.refetchEvents();
            });
        });
    </script>
</body>
</html>
