<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Observação Clínica | APP-TO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans" x-data="formObs({{ paciente_id }})">

    <header class="bg-purple-700 text-white p-4 sticky top-0 z-50 shadow-lg">
        <div class="flex items-center gap-3">
            <a :href="'/paciente/' + pacienteId" class="p-1"> <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg> </a>
            <h1 class="text-xl font-black">Observação Clínica</h1>
        </div>
    </header>

    <main class="p-4 pb-32 space-y-4">
        
        <div class="bg-white rounded-3xl border border-slate-200 overflow-hidden shadow-sm">
            <div class="bg-purple-50 p-4 font-bold text-purple-800">1. Habilidades Psicomotoras</div>
            <div class="p-4 space-y-4">
                <template x-for="item in ['Coordenação Motora Fina', 'Coordenação Global', 'Coordenação Bilateral', 'Habilidades de Pinça', 'Preensão Tripode', 'Encaixe']">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase" x-text="item"></label>
                        <div class="flex gap-1">
                            <template x-for="status in ['Satisfatório', 'Melhoria', 'Inadequado']">
                                <button @click="form.dados_json.psicomotora[item] = status" 
                                        :class="form.dados_json.psicomotora[item] === status ? 'bg-purple-600 text-white shadow-md' : 'bg-slate-100 text-slate-500'"
                                        class="flex-1 py-2.5 rounded-xl text-[9px] font-bold transition-all uppercase" x-text="status"></button>
                            </template>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <div class="bg-white rounded-3xl border border-slate-200 overflow-hidden shadow-sm">
            <div class="bg-emerald-50 p-4 font-bold text-emerald-800">2. Integração Sensorial</div>
            <div class="p-4 space-y-4">
                <template x-for="item in ['Sistema Proprioceptivo', 'Sistema Tátil', 'Sistema Vestibular', 'Sistema Auditivo', 'Sistema Interoceptivo']">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase" x-text="item"></label>
                        <select x-model="form.dados_json.sensorial[item]" class="w-full p-3 bg-slate-50 rounded-xl text-sm border-none focus:ring-2 focus:ring-emerald-500">
                            <option value="">Selecione o perfil...</option>
                            <option>Hipo-responsivo</option>
                            <option>Hiper-responsivo</option>
                            <option>Normal</option>
                            <option>Busca Sensorial</option>
                        </select>
                    </div>
                </template>
            </div>
        </div>

        <button @click="salvar" class="fixed bottom-6 left-4 right-4 bg-purple-700 text-white font-black py-4 rounded-2xl shadow-xl active:scale-95 transition-transform z-50">
            Gravar Observação Clínica
        </button>
    </main>

    <script>
        function formObs(id) {
            return {
                pacienteId: id,
                form: {
                    dados_json: { psicomotora: {}, sensorial: {}, executiva: {}, praxis: {} },
                    observacoes_texto: ''
                },
                salvar() {
                    fetch('/api/obs-clinica/' + this.pacienteId, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(this.form)
                    }).then(res => {
                        if(res.ok) { alert('Sincronizado com Sucesso!'); window.location.href = '/paciente/' + this.pacienteId; }
                    });
                }
            }
        }
    </script>
</body>
</html>
