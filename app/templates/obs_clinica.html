<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Observação Clínica | APP-TO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>body { background-color: #f8fafc; font-family: 'Nunito', sans-serif; }</style>
</head>
<body class="text-slate-800 antialiased" x-data="formObs({{ paciente_id }})">

    <div class="max-w-4xl mx-auto min-h-screen bg-white md:shadow-2xl md:shadow-slate-200/50 md:border-x border-slate-100 relative pb-32">

        <header class="bg-purple-700 text-white p-4 sticky top-0 z-50 shadow-lg md:rounded-b-2xl">
            <div class="flex items-center gap-3">
                <a :href="'/paciente/' + pacienteId" class="p-2 -ml-2 hover:bg-white/20 rounded-full transition-all">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </a>
                <h1 class="text-xl font-black uppercase tracking-wide">Observação Clínica</h1>
            </div>
        </header>

        <main class="p-6 space-y-4">
            
            <div class="bg-white rounded-3xl border border-slate-200 overflow-hidden shadow-sm">
                <div class="bg-purple-50 p-5 font-black text-purple-800 uppercase text-xs tracking-widest border-b">1. Habilidades Psicomotoras</div>
                <div class="p-4 space-y-4">
                    <template x-for="item in ['Coordenação Motora Fina', 'Coordenação Global', 'Coordenação Bilateral', 'Habilidades de Pinça', 'Preensão Tripode', 'Encaixe']">
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest px-1" x-text="item"></label>
                            <div class="flex gap-2">
                                <template x-for="status in ['Satisfatório', 'Melhoria', 'Inadequado']">
                                    <button @click="form.dados_json.psicomotora[item] = status" 
                                            :class="form.dados_json.psicomotora[item] === status ? 'bg-purple-600 text-white shadow-lg' : 'bg-slate-50 text-slate-400'"
                                            class="flex-1 py-3 rounded-2xl text-[9px] font-black uppercase transition-all" x-text="status"></button>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

            <div class="bg-white rounded-3xl border border-slate-200 overflow-hidden shadow-sm">
                <div class="bg-emerald-50 p-5 font-black text-emerald-800 uppercase text-xs tracking-widest border-b">2. Integração Sensorial</div>
                <div class="p-4 space-y-4">
                    <template x-for="item in ['Sistema Proprioceptivo', 'Sistema Tátil', 'Sistema Vestibular', 'Sistema Auditivo', 'Sistema Interoceptivo']">
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest px-1" x-text="item"></label>
                            <select x-model="form.dados_json.sensorial[item]" class="w-full p-4 bg-slate-50 rounded-2xl text-sm font-bold text-slate-700 border-none focus:ring-2 focus:ring-emerald-500 transition-all outline-none shadow-inner">
                                <option value="">Selecione o perfil...</option>
                                <option>Hipo-responsivo</option>
                                <option>Hiper-responsivo</option>
                                <option>Normal</option>
                                <option>Busca Sensorial</option>
                            </select>
                        </div>
                    </template>
                </div>
            </div>

            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                <label class="block text-xs font-black text-slate-400 mb-2 uppercase tracking-widest px-1">Notas Clínicas e Observações Extras</label>
                <textarea x-model="form.observacoes_texto" rows="4" placeholder="Descreva comportamentos específicos, reações ou outras observações importantes..." class="w-full p-4 bg-slate-50 rounded-2xl border-none text-sm font-bold focus:ring-2 focus:ring-purple-500 outline-none resize-none shadow-inner"></textarea>
            </div>
        </main>

        <div class="fixed bottom-0 max-w-4xl w-full p-4 bg-white/90 backdrop-blur-md border-t z-50">
            <button @click="salvar" class="w-full bg-purple-700 text-white font-black py-4 rounded-2xl shadow-xl active:scale-95 transition-all uppercase tracking-widest text-sm">
                Gravar Observação Clínica
            </button>
        </div>
    </div>

    <script>
        function formObs(id) {
            return {
                pacienteId: id,
                form: {
                    dados_json: { psicomotora: {}, sensorial: {}, executiva: {}, praxis: {} },
                    observacoes_texto: ''
                },
                salvar() {
                    fetch('/api/obs-clinica/' + this.pacienteId, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(this.form)
                    }).then(res => {
                        if(res.ok) { alert('Sincronizado com Sucesso!'); window.location.href = '/paciente/' + this.pacienteId; }
                    });
                }
            }
        }
    </script>
</body>
</html>
