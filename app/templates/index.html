<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mesa de Controle | APP-TO</title>
    
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/logo_appto_oficial.png') }}?v=2">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { 
                extend: { 
                    fontFamily: { sans: ['Nunito', 'sans-serif'] },
                    colors: { 
                        clinica: { 50: '#f0fdfa', 100: '#ccfbf1', 500: '#14b8a6', 600: '#0d9488', 900: '#134e4a' } 
                    } 
                } 
            }
        }
    </script>
    <style>
        body { background-color: #f8fafc; overscroll-behavior-y: contain; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        
        @keyframes flutuar {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(15deg); }
        }
        @keyframes flutuarInverso {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(30px) rotate(-15deg); }
        }
        @keyframes pulsar {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.1) rotate(5deg); }
        }
        .anim-flutuar-1 { animation: flutuar 8s ease-in-out infinite; }
        .anim-flutuar-2 { animation: flutuarInverso 10s ease-in-out infinite 1s; }
        .anim-flutuar-3 { animation: flutuar 12s ease-in-out infinite 2s; }
        .anim-flutuar-4 { animation: flutuarInverso 9s ease-in-out infinite 3s; }
        .anim-flutuar-5 { animation: pulsar 7s ease-in-out infinite 0.5s; }
        .anim-flutuar-6 { animation: flutuar 11s ease-in-out infinite 1.5s; }
        .anim-flutuar-7 { animation: flutuarInverso 13s ease-in-out infinite 0.2s; }
    </style>
</head>
<body class="text-slate-800 antialiased relative min-h-screen" x-data="gestaoDashboard()" x-init="inicializar()">

    <div class="fixed inset-0 pointer-events-none z-0 overflow-hidden opacity-10">
        <svg class="absolute top-10 right-10 w-48 h-48 text-rose-500 anim-flutuar-1" fill="currentColor" viewBox="0 0 24 24"><path d="M12,2A7,7,0,0,0,5,9c0,5.25,7,13,7,13s7-7.75,7-13A7,7,0,0,0,12,2Z"/></svg>
        <svg class="absolute top-1/4 -left-10 w-56 h-56 text-blue-500 anim-flutuar-2" fill="currentColor" viewBox="0 0 24 24"><path d="M19,9H17V7A1,1,0,0,0,15,7V9H9V7A1,1,0,0,0,7,7V9H5a3,3,0,0,0-3,3v7a3,3,0,0,0,3,3H19a3,3,0,0,0,3-3V12A3,3,0,0,0,19,9Zm1,10a1,1,0,0,1-1,1H5a1,1,0,0,1-1-1V12a1,1,0,0,1,1-1H19a1,1,0,0,1,1,1Z"/></svg>
        <svg class="absolute bottom-10 right-0 w-64 h-64 text-emerald-500 anim-flutuar-3" fill="currentColor" viewBox="0 0 24 24"><path d="M20.5,10.5H18V8a2,2,0,0,0-2-2H13.5a2,2,0,0,1-4,0H7A2,2,0,0,0,5,8v2.5a2,2,0,0,1,0,4V17a2,2,0,0,0,2,2h2.5a2,2,0,0,1,4,0H16a2,2,0,0,0,2-2V14.5a2,2,0,0,1,2.5-4h0A2,2,0,0,0,20.5,10.5Z"/></svg>
        <svg class="absolute top-1/3 right-20 w-32 h-32 text-amber-400 anim-flutuar-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12,2l3.09,6.26L22,9.27l-5,4.87,1.18,6.88L12,17.77l-6.18,3.25L7,14.14,2,9.27l6.91-1.01L12,2Z"/></svg>
        <svg class="absolute bottom-32 left-1/3 w-40 h-40 text-purple-400 anim-flutuar-4" fill="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg>
    </div>

    <div class="max-w-4xl mx-auto min-h-screen relative z-10 pb-24">

        <header class="bg-clinica-600 text-white p-6 md:rounded-b-3xl shadow-lg relative overflow-hidden">
            <div class="absolute top-0 right-0 w-48 h-48 bg-white opacity-5 rounded-full -mr-16 -mt-16 pointer-events-none"></div>
            
            <div class="flex justify-between items-center relative z-10">
                <div class="flex items-center gap-4">
                    <div class="w-20 h-20 rounded-full border-2 border-white/30 shadow-lg overflow-hidden bg-white/10 backdrop-blur-sm flex items-center justify-center shrink-0">
                        <img src="{{ url_for('static', filename='img/edna_perfil.png') }}" alt="Dra. Edna" class="w-full h-full object-cover object-top">
                    </div>
                    
                    <div>
                        <h1 class="text-2xl font-black tracking-tight leading-none">Olá, Edna!</h1>
                        <p class="text-clinica-100 text-[10px] font-bold uppercase tracking-widest mt-1">Sua Mesa de Controle</p>
                    </div>
                </div>
                
                <div class="w-20 h-20 bg-white rounded-full flex items-center justify-center shadow-xl border border-white/20 overflow-hidden hidden md:flex shrink-0">
                    <img src="{{ url_for('static', filename='img/logo_appto_oficial.png') }}?v=2" alt="Logo APP-TO" class="w-full h-full object-cover">
                </div>
            </div>

            <div class="grid grid-cols-3 gap-3 mt-8 relative z-10">
                <div class="bg-white/10 backdrop-blur-md border border-white/20 rounded-3xl p-4 shadow-inner flex flex-col justify-center items-center text-center">
                    <p class="text-clinica-100 text-[9px] font-black uppercase mb-1 tracking-widest">Hoje</p>
                    <p class="text-3xl font-black" x-text="agendaHoje.length"></p>
                </div>
                
                <a href="/estatisticas" class="bg-white/10 backdrop-blur-md border border-white/20 text-white rounded-3xl p-4 flex flex-col items-center justify-center gap-2 hover:bg-white/20 transition-all active:scale-95 group shadow-sm">
                    <svg class="w-6 h-6 text-clinica-100" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                    <span class="text-[9px] font-black uppercase tracking-widest text-center">Gestão</span>
                </a>

                <button @click="abrirModalCadastro()" class="bg-white text-clinica-600 rounded-3xl p-4 flex flex-col items-center justify-center gap-2 hover:bg-clinica-50 shadow-lg hover:shadow-xl active:scale-95 transition-all group border-2 border-transparent hover:border-clinica-200">
                    <div class="w-7 h-7 rounded-full bg-clinica-50 flex items-center justify-center group-hover:bg-clinica-100 transition-colors">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"></path></svg>
                    </div>
                    <span class="text-[9px] font-black uppercase tracking-widest text-center">Novo<br>Paciente</span>
                </button>
            </div>
        </header>

        <main class="p-6 space-y-10">

            <template x-if="alertas.length > 0">
                <div class="relative">
                    <h2 class="text-sm font-black text-slate-800 uppercase tracking-widest mb-4 flex items-center gap-2">
                        <svg class="w-5 h-5 text-amber-500" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L1 21h22L12 2zm1 16h-2v-2h2v2zm0-4h-2v-4h2v4z"/></svg>
                        Alertas de Prontidão 
                    </h2>
                    <div class="space-y-3">
                        <template x-for="alerta in alertas" :key="alerta.paciente_id">
                            <div @click="window.location.href = '/paciente/' + alerta.paciente_id" 
                                 class="bg-amber-50 border-l-4 border-amber-500 p-4 rounded-r-2xl shadow-sm cursor-pointer hover:bg-amber-100 transition-colors flex items-start gap-4">
                                
                                <div class="w-12 h-12 rounded-full bg-amber-200 flex items-center justify-center text-amber-700 font-black text-lg shrink-0 overflow-hidden border-2 border-white shadow-sm">
                                    <template x-if="alerta.foto_url">
                                        <img :src="alerta.foto_url" class="w-full h-full object-cover object-top">
                                    </template>
                                    <template x-if="!alerta.foto_url">
                                        <span x-text="alerta.nome_paciente ? alerta.nome_paciente.trim().charAt(0).toUpperCase() : '?'"></span>
                                    </template>
                                </div>

                                <div class="flex-1 min-w-0 overflow-hidden">
                                    <h3 class="font-black text-slate-800 text-sm truncate" x-text="alerta.nome_paciente"></h3>
                                    <ul class="mt-1.5 space-y-1.5">
                                        <template x-for="motivo in alerta.motivos">
                                            <li class="text-xs font-bold text-amber-800 flex items-start gap-1.5 leading-tight">
                                                <span class="text-amber-500 mt-0.5">•</span>
                                                <span x-text="motivo"></span>
                                            </li>
                                        </template>
                                    </ul>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </template>
            <div class="relative">
                <div class="flex justify-end items-end mb-4">
                    <div class="flex items-center gap-2">
                        <a href="/agenda" class="bg-clinica-50 hover:bg-clinica-100 text-clinica-600 border border-clinica-200 px-3 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-widest flex items-center gap-1.5 shadow-sm active:scale-95 transition-all">
                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                            Ver Agenda
                        </a>

                        <button @click="abrirModalAgendamento()" class="bg-slate-800 hover:bg-slate-900 text-white px-3 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-widest flex items-center gap-1.5 shadow-sm active:scale-95 transition-all">
                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                            Agendar
                        </button>
                    </div>
                </div>

                <template x-if="agendaVisual.length === 0 && !carregando">
                    <div class="bg-white/80 backdrop-blur-sm p-10 rounded-3xl border-2 border-dashed border-clinica-200 text-center shadow-sm relative overflow-hidden group">
                        <div class="absolute inset-0 bg-gradient-to-br from-clinica-50 to-transparent opacity-50"></div>
                        <svg class="mx-auto h-16 w-16 text-clinica-300 mb-4 relative z-10 group-hover:scale-110 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        <p class="text-lg font-black text-slate-600 relative z-10">Sua agenda está livre!</p>
                        <p class="text-xs font-bold text-slate-400 mt-2 uppercase tracking-widest relative z-10 mb-6">Que tal preparar novas atividades ou agendar um paciente?</p>
                        
                        <button @click="abrirModalAgendamento()" class="relative z-10 bg-clinica-600 hover:bg-clinica-700 text-white px-6 py-3 rounded-xl font-black uppercase tracking-widest text-xs shadow-lg hover:shadow-xl active:scale-95 transition-all inline-flex items-center gap-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                            Criar Novo Agendamento
                        </button>
                    </div>
                </template>

                <div x-show="agendaVisual.length > 0" class="flex overflow-x-auto snap-x snap-mandatory hide-scrollbar gap-4 pb-4 items-stretch px-1" style="scroll-behavior: smooth;">
                    
                    <div class="min-w-[120px] shrink-0 snap-start flex items-center justify-center" x-show="temMaisPassado">
                        <button @click="carregarPassado()" class="h-full w-full bg-slate-100/50 hover:bg-slate-200 border-2 border-dashed border-slate-300 rounded-3xl text-slate-500 font-black uppercase tracking-widest text-[10px] flex flex-col items-center justify-center gap-2 transition-colors active:scale-95">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Anterior
                        </button>
                    </div>

                    <template x-for="item in agendaVisual" :key="item.id">
                        <div @click="window.location.href = '/paciente/' + item.paciente_id" 
                             class="min-w-[320px] w-[320px] shrink-0 snap-center bg-white/90 backdrop-blur-sm p-6 rounded-3xl shadow-md border-l-4 hover:-translate-y-1 transition-all cursor-pointer group flex items-center gap-4"
                             :class="isHoje(item.data) ? 'border-clinica-500 shadow-clinica-100' : 'border-slate-300'">
                            
                            <div class="w-14 h-14 rounded-full bg-clinica-100 flex items-center justify-center text-clinica-600 font-black text-xl overflow-hidden shrink-0 border-2 border-white shadow-sm transition-colors group-hover:border-clinica-300">
                                <template x-if="getPacienteFoto(item.paciente_id)">
                                    <img :src="getPacienteFoto(item.paciente_id)" class="w-full h-full object-cover">
                                </template>
                                <template x-if="!getPacienteFoto(item.paciente_id)">
                                    <span x-text="item.nome_paciente ? item.nome_paciente.trim().charAt(0).toUpperCase() : '?'"></span>
                                </template>
                            </div>

                            <div class="flex-1 min-w-0 overflow-hidden">
                                <div class="flex justify-between items-start mb-1">
                                    <div>
                                        <span class="text-2xl font-black text-slate-800" x-text="item.hora"></span>
                                        <span class="ml-2 text-[10px] font-black uppercase tracking-widest px-2 py-1 rounded-md"
                                              :class="isHoje(item.data) ? 'bg-clinica-100 text-clinica-700' : 'bg-slate-100 text-slate-500'"
                                              x-text="isHoje(item.data) ? 'Hoje' : item.data"></span>
                                    </div>
                                </div>
                                <h3 class="font-black text-slate-700 text-lg truncate group-hover:text-clinica-600 transition-colors" x-text="item.nome_paciente"></h3>
                                <p class="text-slate-400 text-xs font-bold uppercase tracking-widest truncate" x-text="item.tipo_sessao"></p>
                            </div>
                        </div>
                    </template>

                    <div class="min-w-[120px] shrink-0 snap-start flex items-center justify-center" x-show="temMaisFuturo">
                        <button @click="carregarFuturo()" class="h-full w-full bg-clinica-50/50 hover:bg-clinica-100 border-2 border-dashed border-clinica-300 rounded-3xl text-clinica-600 font-black uppercase tracking-widest text-[10px] flex flex-col items-center justify-center gap-2 transition-colors active:scale-95">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                            Próximo
                        </button>
                    </div>
                </div>

            </div>

            <div class="bg-white/90 backdrop-blur-sm p-6 rounded-3xl shadow-sm border border-slate-100">
                <h2 class="text-sm font-black text-slate-800 uppercase tracking-widest mb-4 flex items-center gap-2">
                    <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                    Acesso Rápido a Pacientes
                </h2>
                
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <svg class="h-5 w-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    </div>
                    <input type="text" x-model="pesquisa" placeholder="Digite o nome para buscar um prontuário..." 
                           class="w-full pl-11 pr-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-clinica-500 transition-all outline-none text-sm font-bold text-slate-700 shadow-inner">
                </div>

                <div x-show="pesquisa.length > 0 || mostrarLista" x-transition class="mt-4 space-y-3">
                    <template x-if="pacientesFiltrados().length === 0">
                        <div class="text-center py-6 bg-slate-50 rounded-2xl">
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Nenhum paciente encontrado.</p>
                        </div>
                    </template>

                    <template x-for="paciente in pacientesFiltrados()" :key="paciente.id">
                        <div @click="window.location.href = '/paciente/' + paciente.id" 
                             class="group bg-slate-50 p-4 rounded-2xl border border-slate-100 flex items-center gap-4 cursor-pointer hover:bg-white hover:border-clinica-300 hover:shadow-md transition-all active:scale-[0.98]">
                            
                            <div class="w-12 h-12 rounded-full bg-clinica-100 text-clinica-600 font-black text-lg flex items-center justify-center uppercase shrink-0 overflow-hidden border-2 border-white shadow-sm group-hover:bg-clinica-500 group-hover:text-white transition-colors">
                                <template x-if="paciente.foto_url">
                                    <img :src="paciente.foto_url" class="w-full h-full object-cover">
                                </template>
                                <template x-if="!paciente.foto_url">
                                    <span x-text="paciente.nome ? paciente.nome.trim().charAt(0).toUpperCase() : '?'"></span>
                                </template>
                            </div>

                            <div class="flex-1 min-w-0 overflow-hidden">
                                <h3 class="font-black text-slate-700 text-sm truncate mb-0.5 group-hover:text-slate-900" x-text="paciente.nome"></h3>
                                <span class="block w-full text-slate-400 text-[9px] font-bold truncate uppercase tracking-wider" 
                                      x-text="paciente.diagnostico || 'Triagem Inicial'"></span>
                            </div>
                            <div class="shrink-0 text-slate-300 group-hover:text-clinica-500 transition-colors">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                            </div>
                        </div>
                    </template>
                </div>

                <div class="mt-4 text-center">
                    <button x-show="pesquisa.length === 0 && !mostrarLista && pacientes.length > 0" @click="mostrarLista = true" 
                            class="text-[10px] font-black text-slate-400 hover:text-clinica-600 uppercase tracking-widest transition-colors inline-flex items-center justify-center gap-1 mx-auto p-2">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        Ver Diretório Completo
                    </button>
                    <button x-show="pesquisa.length === 0 && mostrarLista" @click="mostrarLista = false" 
                            class="text-[10px] font-black text-rose-400 hover:text-rose-600 uppercase tracking-widest transition-colors inline-flex items-center justify-center gap-1 mx-auto p-2">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"></path></svg>
                        Recolher Diretório
                    </button>
                </div>
            </div>

        </main>

        <footer class="mt-12 p-8 text-center space-y-6">
            <a href="/logout" class="inline-flex items-center gap-2 px-6 py-3 bg-red-50 text-red-500 rounded-2xl text-[11px] font-black uppercase tracking-widest border border-red-100 hover:bg-red-500 hover:text-white transition-all active:scale-95 shadow-sm mx-auto">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                Encerrar Sessão Clínica
            </a>

            <div class="opacity-40 grayscale flex flex-col items-center gap-2">
                <span class="text-[9px] font-bold text-slate-500 uppercase tracking-widest">Tecnologia e Inovação</span>
                <div class="flex items-center gap-2">
                    <div class="w-6 h-6 bg-slate-800 rounded flex items-center justify-center text-white font-black text-[10px]">V</div>
                    <span class="text-xs font-black text-slate-700 tracking-tight uppercase">Vórtice Hub</span>
                </div>
            </div>
        </footer>

        <div x-show="modalAgendamentoAberto" style="display: none;" class="fixed inset-0 z-[60] overflow-y-auto">
            <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
                <div x-show="modalAgendamentoAberto" x-transition.opacity class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm" @click="fecharModalAgendamento()"></div>
                <span class="hidden sm:inline-block sm:align-middle sm:h-screen">&#8203;</span>
                <div x-show="modalAgendamentoAberto" x-transition.scale class="inline-block align-bottom bg-white rounded-t-3xl sm:rounded-3xl text-left overflow-hidden shadow-2xl transform transition-all sm:my-8 sm:align-middle w-full sm:max-w-md border-t-4 border-clinica-600">
                    <div class="bg-white px-6 pt-6 pb-6 text-center">
                        <div class="flex justify-between items-center mb-6">
                            <h3 class="text-xl font-black text-slate-800">Agendar Sessão</h3>
                            <button @click="fecharModalAgendamento()" class="text-slate-400 hover:text-slate-600 p-2 bg-slate-50 rounded-full"><svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg></button>
                        </div>
                        
                        <div class="space-y-4 text-left">
                            <div>
                                <div class="flex justify-between items-end mb-1.5 px-1">
                                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest">Paciente</label>
                                    <button type="button" @click="fecharModalAgendamento(); setTimeout(() => abrirModalCadastro(), 100);" class="text-[10px] font-black text-clinica-500 hover:text-clinica-700 transition-colors uppercase tracking-widest bg-clinica-50 px-2 py-0.5 rounded-md border border-clinica-100">+ Cadastrar Criança</button>
                                </div>
                                <select x-model="novoAgendamento.paciente_id" class="w-full p-3 bg-slate-50 border border-slate-100 rounded-xl focus:ring-2 focus:ring-clinica-500 outline-none text-sm font-bold text-slate-700 shadow-inner">
                                    <option value="">Selecione a criança...</option>
                                    <template x-for="paciente in pacientes" :key="paciente.id">
                                        <option :value="paciente.id" x-text="paciente.nome"></option>
                                    </template>
                                </select>
                            </div>
                            
                            <div>
                                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5">Profissional / Equipe</label>
                                <select x-model="novoAgendamento.profissional_id" class="w-full p-3 bg-slate-50 border border-slate-100 rounded-xl focus:ring-2 focus:ring-clinica-500 outline-none text-sm font-bold text-slate-700 shadow-inner">
                                    <template x-for="prof in profissionais" :key="prof.id">
                                        <option :value="prof.id" x-text="prof.nome"></option>
                                    </template>
                                </select>
                            </div>

                            <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5">Data e Hora Inicial</label>
                                    <input type="datetime-local" x-model="novoAgendamento.data_hora" class="w-full p-3 bg-slate-50 border border-slate-100 rounded-xl focus:ring-2 focus:ring-clinica-500 outline-none text-sm font-bold text-slate-700 shadow-inner">
                                </div>
                                <div>
                                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5">Tipo de Sessão</label>
                                    <select x-model="novoAgendamento.tipo_sessao" class="w-full p-3 bg-slate-50 border border-slate-100 rounded-xl focus:ring-2 focus:ring-clinica-500 outline-none text-sm font-bold text-slate-700 shadow-inner">
                                        <option>Intervenção</option>
                                        <option>Avaliação</option>
                                        <option>Reunião Familiar</option>
                                    </select>
                                </div>
                            </div>

                            <div class="mt-4 p-4 bg-clinica-50/50 rounded-xl border border-clinica-100">
                                <label class="flex items-center gap-2 cursor-pointer mb-3">
                                    <input type="checkbox" x-model="novoAgendamento.is_recorrente" class="w-4 h-4 text-clinica-600 rounded">
                                    <span class="text-xs font-black text-slate-700 uppercase tracking-widest">Agendamento Recorrente?</span>
                                </label>

                                <div x-show="novoAgendamento.is_recorrente" x-transition class="pl-6 space-y-2 border-l-2 border-clinica-200">
                                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest">Repetir por quanto tempo?</label>
                                    <select x-model="novoAgendamento.meses_recorrencia" class="w-full p-2.5 bg-white border border-slate-200 rounded-lg text-sm font-bold text-slate-700 shadow-sm outline-none focus:ring-2 focus:ring-clinica-500">
                                        <option value="1">1 Mês (4 semanas)</option>
                                        <option value="3">3 Meses (12 semanas)</option>
                                        <option value="6">6 Meses (24 semanas)</option>
                                        <option value="12">1 Ano (48 semanas)</option>
                                    </select>
                                    <p class="text-[9px] text-slate-500 italic mt-1">O sistema reservará este mesmo horário semanalmente no calendário.</p>
                                </div>
                            </div>

                        </div>
                    </div>

                    <div class="bg-slate-50 px-6 py-5 flex flex-col-reverse sm:flex-row sm:justify-end gap-3 rounded-b-3xl">
                        <button type="button" @click="fecharModalAgendamento()" class="w-full sm:w-auto px-6 py-3 font-bold text-slate-500 hover:text-slate-800 transition-colors">Cancelar</button>
                        <button type="button" @click="salvarAgendamento()" :disabled="salvandoAgendamento" class="w-full sm:w-auto px-8 py-3 rounded-xl shadow-lg text-white bg-clinica-600 hover:bg-clinica-700 font-black flex items-center justify-center transition-all active:scale-95 disabled:opacity-70">
                            <span x-text="salvandoAgendamento ? 'Agendando...' : 'Confirmar Agenda'"></span>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div x-show="modalCadastroAberto" style="display: none;" class="fixed inset-0 z-[70] overflow-y-auto">
            <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
                <div x-show="modalCadastroAberto" x-transition.opacity class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm" @click="fecharModal()"></div>
                <span class="hidden sm:inline-block sm:align-middle sm:h-screen">&#8203;</span>
                <div x-show="modalCadastroAberto" x-transition.scale class="inline-block align-bottom bg-white rounded-t-3xl sm:rounded-3xl text-left overflow-hidden shadow-2xl transform transition-all sm:my-8 sm:align-middle w-full sm:max-w-lg">
                    <div class="bg-white px-6 pt-6 pb-6 text-center border-b-4 border-clinica-500">
                        <div class="flex justify-between items-center mb-6">
                            <h3 class="text-xl font-black text-slate-800">Novo Paciente</h3>
                            <button @click="fecharModal()" class="text-slate-400 hover:text-slate-600 p-2 bg-slate-50 rounded-full"><svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg></button>
                        </div>
                        
                        <div class="space-y-4 max-h-[65vh] overflow-y-auto custom-scrollbar px-1 text-left">
                            <div>
                                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Nome da Criança</label>
                                <input type="text" x-model="novoPaciente.nome" class="w-full p-3 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-clinica-500 outline-none text-sm font-bold" placeholder="Nome completo">
                            </div>

                            <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100 space-y-3">
                                <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest border-b border-slate-200 pb-1">Responsáveis e Contato</p>
                                <input type="text" x-model="novoPaciente.nome_responsavel" placeholder="Nome da Mãe/Pai" class="w-full p-2.5 bg-white border border-slate-200 rounded-lg text-sm font-bold outline-none focus:ring-2 focus:ring-clinica-500">
                                <div class="grid grid-cols-2 gap-3">
                                    <input type="tel" x-model="novoPaciente.telefone_responsavel" placeholder="WhatsApp" class="w-full p-2.5 bg-white border border-slate-200 rounded-lg text-sm font-bold outline-none focus:ring-2 focus:ring-clinica-500">
                                    <input type="email" x-model="novoPaciente.email_responsavel" placeholder="E-mail" class="w-full p-2.5 bg-white border border-slate-200 rounded-lg text-sm font-bold outline-none focus:ring-2 focus:ring-clinica-500">
                                </div>
                            </div>

                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Nascimento</label>
                                    <input type="date" x-model="novoPaciente.data_nascimento" class="w-full p-3 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-clinica-500 outline-none text-sm font-bold">
                                </div>
                                <div>
                                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Escolaridade</label>
                                    <select x-model="novoPaciente.escolaridade" class="w-full p-3 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-clinica-500 outline-none text-sm font-bold text-slate-600">
                                        <option value="">Selecione...</option>
                                        <option value="Creche">Creche</option>
                                        <option value="Educação Infantil">Educação Infantil</option>
                                        <option value="Fundamental I">Fundamental I</option>
                                        <option value="Fundamental II">Fundamental II</option>
                                        <option value="Não frequenta">Não frequenta</option>
                                    </select>
                                </div>
                            </div>

                            <div class="relative" x-data="{ open: false }">
                                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Diagnóstico (Laudo)</label>
                                <button type="button" @click="open = !open" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-left flex justify-between items-center focus:ring-2 focus:ring-clinica-500 outline-none">
                                    <span class="truncate text-slate-600 font-bold text-sm" x-text="diagnosticosSelecionados.length === 0 ? 'Selecione as opções...' : diagnosticosSelecionados.join(', ')"></span>
                                    <svg class="h-5 w-5 text-slate-500 transition-transform" :class="{'rotate-180': open}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                </button>
                                <div x-show="open" @click.away="open = false" class="absolute z-20 mt-1 w-full bg-white border border-slate-200 rounded-xl shadow-2xl max-h-48 overflow-y-auto custom-scrollbar p-2">
                                    <template x-for="opcao in listaDisfuncoes" :key="opcao">
                                        <label class="flex items-center gap-3 p-3 hover:bg-clinica-50 rounded-lg cursor-pointer transition-colors">
                                            <input type="checkbox" :value="opcao" x-model="diagnosticosSelecionados" class="w-5 h-5 text-clinica-600 rounded focus:ring-clinica-500">
                                            <span class="text-sm font-bold text-slate-700" x-text="opcao"></span>
                                        </label>
                                    </template>
                                </div>
                            </div>

                            <div>
                                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 px-1">Motivo / Queixa Principal</label>
                                <textarea x-model="novoPaciente.queixa_principal" rows="3" placeholder="Relato inicial da família..." 
                                          class="w-full p-3 bg-slate-50 border border-slate-100 rounded-xl focus:ring-2 focus:ring-clinica-500 outline-none text-sm font-bold shadow-inner resize-none"></textarea>
                            </div>
                        </div>
                    </div>

                    <div class="bg-slate-50 px-6 py-5 flex flex-col-reverse sm:flex-row sm:justify-end gap-3 rounded-b-3xl">
                        <button type="button" @click="fecharModal()" class="w-full sm:w-auto px-6 py-3 font-bold text-slate-500 hover:text-slate-800 transition-colors">Cancelar</button>
                        <button type="button" @click="salvarPaciente()" :disabled="salvando" class="w-full sm:w-auto px-8 py-3 rounded-xl shadow-lg text-white bg-clinica-600 hover:bg-clinica-700 font-black flex items-center justify-center transition-all active:scale-95 disabled:opacity-70">
                            <span x-text="salvando ? 'Salvando...' : 'Cadastrar Paciente'"></span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function gestaoDashboard() {
            return {
                pacientes: [],
                agendaHoje: [], 
                agendaVisual: [], 
                alertas: [], 
                
                profissionais: [
                    { id: 1, nome: 'Dra. Edna Nogueira (T.O.)' },
                    { id: 2, nome: 'Dr. Profissional 2' },
                    { id: 3, nome: 'Dra. Profissional 3' }
                ],
                
                carregando: true,
                pesquisa: '',
                mostrarLista: false, 
                modalCadastroAberto: false,
                salvando: false,
                novoPaciente: { nome: '', data_nascimento: '', escolaridade: '', queixa_principal: '', nome_responsavel: '', telefone_responsavel: '', email_responsavel: '' },
                diagnosticosSelecionados: [],
                listaDisfuncoes: ["TEA - Nível de Suporte 1", "TEA - Nível de Suporte 2", "TEA - Nível de Suporte 3", "TDAH", "TPS", "TDC", "DI - (Deficiência Intelectual)", "Paralisia Cerebral", "Síndrome de Down", "TOD", "Em Investigação", "Outro"],
                
                modalAgendamentoAberto: false,
                salvandoAgendamento: false,
                novoAgendamento: { paciente_id: '', data_hora: '', tipo_sessao: 'Intervenção', is_recorrente: false, meses_recorrencia: '1', profissional_id: '1' },
                
                offsetFuturo: 0,
                offsetPassado: 0,
                temMaisFuturo: true,
                temMaisPassado: true,

                inicializar() {
                    this.carregando = true;
                    Promise.all([
                        fetch('/api/pacientes/').then(res => res.json()),
                        fetch('/api/consultas/agenda').then(res => res.json()),
                        fetch('/api/pacientes/alertas').then(res => res.json())
                    ]).then(([dadosPacientes, dadosAgenda, dadosAlertas]) => {
                        this.pacientes = dadosPacientes;
                        this.alertas = Array.isArray(dadosAlertas) ? dadosAlertas : [];
                        
                        const hoje = new Date().toLocaleDateString('pt-BR');
                        this.agendaHoje = Array.isArray(dadosAgenda) ? dadosAgenda.filter(item => item.data === hoje) : [];
                        
                        this.carregarFuturo();
                        
                    }).catch(err => {
                        console.error('Erro ao carregar dashboard:', err);
                        this.carregando = false;
                    });
                },

                carregarFuturo() {
                    fetch(`/api/consultas/agenda_paginada?direcao=futuro&offset=${this.offsetFuturo}&limit=6`)
                    .then(res => res.json())
                    .then(data => {
                        if(data.length < 6) this.temMaisFuturo = false;
                        if (data.length > 0) {
                            this.agendaVisual = [...this.agendaVisual, ...data];
                            this.offsetFuturo += data.length;
                        }
                        this.carregando = false;
                    });
                },

                carregarPassado() {
                    fetch(`/api/consultas/agenda_paginada?direcao=passado&offset=${this.offsetPassado}&limit=6`)
                    .then(res => res.json())
                    .then(data => {
                        if (data.length < 6) this.temMaisPassado = false;
                        if (data.length > 0) {
                            this.agendaVisual = [...data.reverse(), ...this.agendaVisual]; 
                            this.offsetPassado += data.length;
                        }
                    });
                },

                getPacienteFoto(id) {
                    const p = this.pacientes.find(p => p.id === id);
                    return p ? p.foto_url : null;
                },

                isHoje(dataStr) {
                    return dataStr === new Date().toLocaleDateString('pt-BR');
                },

                abrirModalCadastro() {
                    this.novoPaciente = { nome: '', data_nascimento: '', escolaridade: '', queixa_principal: '', nome_responsavel: '', telefone_responsavel: '', email_responsavel: '' };
                    this.diagnosticosSelecionados = [];
                    this.modalCadastroAberto = true;
                },
                fecharModal() { this.modalCadastroAberto = false; },
                
                salvarPaciente() {
                    if (!this.novoPaciente.nome || !this.novoPaciente.data_nascimento) { alert("Nome e Nascimento obrigatórios."); return; }
                    this.salvando = true;
                    const payload = { ...this.novoPaciente, diagnostico: this.diagnosticosSelecionados.join(', ') };
                    fetch('/api/pacientes/', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    }).then(res => res.json()).then(data => {
                        if (data.id) { 
                            this.fecharModal(); 
                            this.agendaVisual = [];
                            this.offsetFuturo = 0;
                            this.offsetPassado = 0;
                            this.temMaisFuturo = true;
                            this.temMaisPassado = true;
                            this.inicializar(); 
                        }
                        this.salvando = false;
                    }).catch(() => { this.salvando = false; });
                },
                
                abrirModalAgendamento() {
                    if (!this.novoAgendamento.data_hora) {
                        const agora = new Date();
                        agora.setMinutes(agora.getMinutes() - agora.getTimezoneOffset());
                        this.novoAgendamento.data_hora = agora.toISOString().slice(0, 16);
                    }
                    this.modalAgendamentoAberto = true;
                },
                fecharModalAgendamento() { this.modalAgendamentoAberto = false; },

                salvarAgendamento() {
                    if (!this.novoAgendamento.paciente_id || !this.novoAgendamento.data_hora) {
                        alert("Por favor, selecione um paciente e o horário.");
                        return;
                    }
                    this.salvandoAgendamento = true;
                    
                    const payload = {
                        paciente_id: this.novoAgendamento.paciente_id,
                        profissional_id: parseInt(this.novoAgendamento.profissional_id),
                        data_hora: this.novoAgendamento.data_hora.replace('T', ' '),
                        status: 'Agendado',
                        tipo_sessao: this.novoAgendamento.tipo_sessao,
                        recorrente: this.novoAgendamento.is_recorrente,
                        meses_recorrencia: parseInt(this.novoAgendamento.meses_recorrencia),
                        evolucao_texto: '',
                        micro_metas: {}
                    };

                    fetch('/api/consultas/', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    }).then(res => res.json()).then(data => {
                        this.fecharModalAgendamento();
                        
                        this.agendaVisual = [];
                        this.offsetFuturo = 0;
                        this.offsetPassado = 0;
                        this.temMaisFuturo = true;
                        this.temMaisPassado = true;
                        this.inicializar(); 
                        
                        this.salvandoAgendamento = false;
                        this.novoAgendamento = { paciente_id: '', data_hora: '', tipo_sessao: 'Intervenção', is_recorrente: false, meses_recorrencia: '1', profissional_id: '1' };
                    }).catch(() => { this.salvandoAgendamento = false; });
                },

                pacientesFiltrados() {
                    if (this.pesquisa === '') return this.pacientes;
                    const t = this.pesquisa.toLowerCase();
                    return this.pacientes.filter(p => p.nome.toLowerCase().includes(t) || (p.diagnostico && p.diagnostico.toLowerCase().includes(t)));
                }
            }
        }
    </script>
</body>
</html>
