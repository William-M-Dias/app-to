<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mesa de Controle | APP-TO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { 
                extend: { 
                    fontFamily: { sans: ['Nunito', 'sans-serif'] },
                    colors: { 
                        clinica: { 50: '#f0fdfa', 100: '#ccfbf1', 500: '#14b8a6', 600: '#0d9488', 900: '#134e4a' } 
                    } 
                } 
            }
        }
    </script>
    <style>
        body { background-color: #f8fafc; overscroll-behavior-y: contain; -webkit-tap-highlight-color: transparent; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        
        /* Barra de rolagem invisível para a esteira da Agenda */
        .agenda-scroll::-webkit-scrollbar { height: 6px; }
        .agenda-scroll::-webkit-scrollbar-track { background: transparent; }
        .agenda-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="text-slate-800 antialiased" x-data="gestaoDashboard()" x-init="inicializar()">

    <div class="max-w-4xl mx-auto min-h-screen bg-white md:shadow-2xl md:shadow-slate-200/50 md:border-x border-slate-100 relative pb-24">

        <header class="bg-clinica-600 text-white p-6 md:rounded-b-3xl shadow-md relative overflow-hidden">
            <div class="absolute top-0 right-0 w-48 h-48 bg-white opacity-5 rounded-full -mr-16 -mt-16 pointer-events-none"></div>
            
            <div class="flex justify-between items-center relative z-10">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center backdrop-blur-sm">
                        <svg class="w-6 h-6 text-white" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 2.38 1.19 4.47 3 5.74V17c0 1.1.9 2 2 2h4c1.1 0 2-.9 2-2v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.87-3.13-7-7-7z"/></svg>
                    </div>
                    <div>
                        <h1 class="text-2xl font-black tracking-tight leading-none">Olá, Edna!</h1>
                        <p class="text-clinica-100 text-xs font-bold uppercase tracking-widest mt-1 leading-none">Mesa de Controle</p>
                    </div>
                </div>
                
                <a href="/logout" class="bg-red-500/20 text-white border border-red-500/50 hover:bg-red-500 px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-colors flex items-center gap-2 shadow-sm active:scale-95">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                    Sair
                </a>
            </div>

            <div class="grid grid-cols-2 gap-3 mt-8 relative z-10">
                <div class="bg-white/10 backdrop-blur-md border border-white/20 rounded-2xl p-4">
                    <p class="text-clinica-100 text-[10px] font-bold uppercase mb-1 tracking-widest">Pacientes Ativos</p>
                    <p class="text-3xl font-black" x-text="pacientes.length || '0'"></p>
                </div>
                <button @click="abrirModalCadastro()" class="bg-white text-clinica-600 rounded-2xl p-4 flex flex-col items-center justify-center gap-1 hover:bg-clinica-50 shadow-sm active:scale-95 transition-all">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"></path></svg>
                    <span class="text-[10px] font-black uppercase mt-1 tracking-widest">Novo Paciente</span>
                </button>
            </div>
        </header>

        <main class="p-6 space-y-8">
            
            <div x-show="agenda.length > 0" style="display: none;">
                <h2 class="text-sm font-black text-slate-400 uppercase tracking-widest mb-3 px-1 flex items-center gap-2">
                    <svg class="w-4 h-4 text-clinica-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    Próximos Atendimentos
                </h2>
                
                <div class="flex overflow-x-auto gap-4 pb-4 agenda-scroll snap-x">
                    <template x-for="item in agenda" :key="item.id">
                        <div @click="window.location.href = '/paciente/' + item.paciente_id" 
                             class="snap-start shrink-0 w-64 bg-slate-800 p-5 rounded-3xl shadow-lg border border-slate-700 cursor-pointer hover:-translate-y-1 transition-transform relative overflow-hidden group">
                            
                            <div class="absolute top-0 right-0 w-24 h-24 bg-clinica-500 opacity-20 rounded-full -mr-8 -mt-8 pointer-events-none transition-transform group-hover:scale-150 duration-500"></div>
                            
                            <div class="flex justify-between items-start mb-4 relative z-10">
                                <div>
                                    <span class="text-clinica-400 font-black text-2xl leading-none" x-text="item.hora"></span>
                                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1" x-text="item.data"></p>
                                </div>
                                <div class="bg-white/10 p-2 rounded-xl backdrop-blur-sm shadow-inner group-hover:bg-clinica-500 group-hover:text-white transition-colors">
                                    <svg class="w-5 h-5 text-clinica-300 group-hover:text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                                </div>
                            </div>
                            
                            <h3 class="font-black text-white text-lg truncate relative z-10" x-text="item.nome_paciente"></h3>
                            <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest truncate mt-1 relative z-10" x-text="item.tipo_sessao"></p>
                        </div>
                    </template>
                </div>
            </div>

            <div>
                <h2 class="text-sm font-black text-slate-400 uppercase tracking-widest mb-3 px-1 flex items-center gap-2">
                    <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                    Diretório de Pacientes
                </h2>
                
                <div class="relative mb-4">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <svg class="h-5 w-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    </div>
                    <input type="text" x-model="pesquisa" placeholder="Buscar por nome ou diagnóstico..." 
                           class="w-full pl-11 pr-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-clinica-500 transition-shadow outline-none text-sm font-semibold text-slate-700 shadow-sm">
                </div>

                <div class="space-y-3">
                    <template x-if="!carregando && pacientesFiltrados().length === 0">
                        <div class="text-center py-10 bg-slate-50 border-2 border-dashed border-slate-200 rounded-3xl">
                            <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Nenhum paciente encontrado.</p>
                        </div>
                    </template>

                    <template x-for="paciente in pacientesFiltrados()" :key="paciente.id">
                        <div @click="window.location.href = '/paciente/' + paciente.id" 
                             class="group bg-white p-4 rounded-2xl border border-slate-100 shadow-sm flex items-center gap-4 cursor-pointer hover:border-clinica-300 hover:shadow-md transition-all active:scale-[0.98]">
                            <div class="w-14 h-14 rounded-full bg-clinica-50 text-clinica-600 font-black text-xl flex items-center justify-center uppercase shrink-0 group-hover:bg-clinica-600 group-hover:text-white transition-colors">
                                <span x-text="paciente.nome.charAt(0)"></span>
                            </div>
                            <div class="flex-1 min-w-0">
                                <h3 class="font-black text-slate-800 text-base truncate mb-1" x-text="paciente.nome"></h3>
                                <span class="inline-block bg-slate-100 text-slate-500 text-[10px] px-2.5 py-1 rounded-md font-bold truncate max-w-full uppercase tracking-wider" 
                                      x-text="paciente.diagnostico || 'Triagem Inicial'"></span>
                            </div>
                            <div class="w-8 h-8 rounded-full bg-slate-50 flex items-center justify-center text-slate-400 group-hover:bg-clinica-50 group-hover:text-clinica-600 transition-colors shrink-0">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </main>

        <div x-show="modalCadastroAberto" style="display: none;" class="fixed inset-0 z-50 overflow-y-auto">
            <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
                <div x-show="modalCadastroAberto" x-transition.opacity class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm" @click="fecharModal()"></div>
                <span class="hidden sm:inline-block sm:align-middle sm:h-screen">&#8203;</span>
                <div x-show="modalCadastroAberto" x-transition.scale class="inline-block align-bottom bg-white rounded-t-3xl sm:rounded-3xl text-left overflow-hidden shadow-2xl transform transition-all sm:my-8 sm:align-middle w-full sm:max-w-lg">
                    <div class="bg-white px-6 pt-6 pb-6 text-center">
                        <div class="flex justify-between items-center mb-6">
                            <h3 class="text-xl font-black text-slate-800">Novo Paciente</h3>
                            <button @click="fecharModal()" class="text-slate-400 hover:text-slate-600 p-2"><svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg></button>
                        </div>
                        
                        <div class="space-y-4 max-h-[65vh] overflow-y-auto custom-scrollbar px-1 text-left">
                            <div>
                                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Nome da Criança</label>
                                <input type="text" x-model="novoPaciente.nome" class="w-full p-3 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-clinica-500 outline-none text-sm font-bold" placeholder="Nome completo">
                            </div>

                            <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100 space-y-3">
                                <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest border-b border-slate-200 pb-1">Responsáveis</p>
                                <input type="text" x-model="novoPaciente.nome_responsavel" placeholder="Nome da Mãe/Pai" class="w-full p-2.5 bg-white border border-slate-200 rounded-lg text-sm font-bold outline-none">
                                <div class="grid grid-cols-2 gap-3">
                                    <input type="tel" x-model="novoPaciente.telefone_responsavel" placeholder="WhatsApp" class="w-full p-2.5 bg-white border border-slate-200 rounded-lg text-sm font-bold outline-none">
                                    <input type="email" x-model="novoPaciente.email_responsavel" placeholder="E-mail" class="w-full p-2.5 bg-white border border-slate-200 rounded-lg text-sm font-bold outline-none">
                                </div>
                            </div>

                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Nascimento</label>
                                    <input type="date" x-model="novoPaciente.data_nascimento" class="w-full p-3 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-clinica-500 outline-none text-sm font-bold">
                                </div>
                                <div>
                                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Escolaridade</label>
                                    <select x-model="novoPaciente.escolaridade" class="w-full p-3 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-clinica-500 outline-none text-sm font-bold">
                                        <option value="">Selecione...</option>
                                        <option value="Creche">Creche</option>
                                        <option value="Educação Infantil">Educação Infantil</option>
                                        <option value="Fundamental I">Fundamental I</option>
                                        <option value="Fundamental II">Fundamental II</option>
                                        <option value="Não frequenta">Não frequenta</option>
                                    </select>
                                </div>
                            </div>

                            <div class="relative" x-data="{ open: false }">
                                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Diagnóstico (Laudo)</label>
                                <button type="button" @click="open = !open" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-left flex justify-between items-center focus:ring-2 focus:ring-clinica-500 outline-none">
                                    <span class="truncate text-slate-700 font-bold text-sm" x-text="diagnosticosSelecionados.length === 0 ? 'Selecione...' : diagnosticosSelecionados.join(', ')"></span>
                                    <svg class="h-5 w-5 text-slate-500 transition-transform" :class="{'rotate-180': open}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                </button>
                                <div x-show="open" @click.away="open = false" class="absolute z-20 mt-1 w-full bg-white border border-slate-200 rounded-xl shadow-xl max-h-48 overflow-y-auto custom-scrollbar p-2">
                                    <template x-for="opcao in listaDisfuncoes" :key="opcao">
                                        <label class="flex items-center gap-3 p-3 hover:bg-clinica-50 rounded-lg cursor-pointer">
                                            <input type="checkbox" :value="opcao" x-model="diagnosticosSelecionados" class="w-5 h-5 text-clinica-600 rounded">
                                            <span class="text-sm font-bold text-slate-700" x-text="opcao"></span>
                                        </label>
                                    </template>
                                </div>
                            </div>

                            <div>
                                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 px-1">Motivo / Queixa Principal</label>
                                <textarea x-model="novoPaciente.queixa_principal" rows="3" placeholder="Relato inicial da família sobre as dificuldades da criança..." 
                                          class="w-full p-3 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-clinica-500 outline-none text-sm font-bold shadow-inner resize-none"></textarea>
                            </div>
                        </div>
                    </div>

                    <div class="bg-slate-50 px-6 py-4 flex flex-col-reverse sm:flex-row sm:justify-end gap-3 rounded-b-3xl">
                        <button type="button" @click="fecharModal()" class="w-full sm:w-auto px-6 py-3 font-bold text-slate-600">Cancelar</button>
                        <button type="button" @click="salvarPaciente()" :disabled="salvando" class="w-full sm:w-auto px-6 py-3 rounded-xl shadow-md text-white bg-clinica-600 font-black flex items-center justify-center">
                            <span x-text="salvando ? 'Salvando...' : 'Cadastrar Paciente'"></span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function gestaoDashboard() {
            return {
                pacientes: [],
                agenda: [],
                carregando: true,
                pesquisa: '',
                modalCadastroAberto: false,
                salvando: false,
                novoPaciente: { nome: '', data_nascimento: '', escolaridade: '', queixa_principal: '', nome_responsavel: '', telefone_responsavel: '', email_responsavel: '' },
                diagnosticosSelecionados: [],
                listaDisfuncoes: ["TEA", "TDAH", "TPS", "TDC", "Paralisia Cerebral", "Síndrome de Down", "TOD", "Em Investigação", "Outro"],
                
                inicializar() {
                    this.carregando = true;
                    // Faz as duas buscas ao mesmo tempo: Agenda e Pacientes
                    Promise.all([
                        fetch('/api/pacientes/').then(res => res.json()),
                        fetch('/api/consultas/agenda').then(res => res.json())
                    ]).then(([dadosPacientes, dadosAgenda]) => {
                        this.pacientes = dadosPacientes;
                        this.agenda = Array.isArray(dadosAgenda) ? dadosAgenda : [];
                        this.carregando = false;
                    }).catch(err => {
                        console.error('Erro ao carregar dashboard:', err);
                        this.carregando = false;
                    });
                },

                abrirModalCadastro() {
                    this.novoPaciente = { nome: '', data_nascimento: '', escolaridade: '', queixa_principal: '', nome_responsavel: '', telefone_responsavel: '', email_responsavel: '' };
                    this.diagnosticosSelecionados = [];
                    this.modalCadastroAberto = true;
                },
                fecharModal() { this.modalCadastroAberto = false; },
                
                salvarPaciente() {
                    if (!this.novoPaciente.nome || !this.novoPaciente.data_nascimento) { alert("Nome e Nascimento obrigatórios."); return; }
                    this.salvando = true;
                    const payload = { ...this.novoPaciente, diagnostico: this.diagnosticosSelecionados.join(', ') };
                    fetch('/api/pacientes/', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    }).then(res => res.json()).then(data => {
                        if (data.id) { 
                            this.fecharModal(); 
                            this.inicializar(); // Recarrega tudo
                        }
                        this.salvando = false;
                    }).catch(() => { this.salvando = false; });
                },
                
                pacientesFiltrados() {
                    if (this.pesquisa === '') return this.pacientes;
                    const t = this.pesquisa.toLowerCase();
                    return this.pacientes.filter(p => p.nome.toLowerCase().includes(t) || (p.diagnostico && p.diagnostico.toLowerCase().includes(t)));
                }
            }
        }
    </script>
</body>
</html>
