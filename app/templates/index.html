<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APP-TO | Terapia Ocupacional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { clinica: { 50: '#f0fdfa', 100: '#ccfbf1', 500: '#14b8a6', 600: '#0d9488', 900: '#134e4a' } } } }
        }
    </script>
    <style>
        body { overscroll-behavior-y: contain; -webkit-tap-highlight-color: transparent; }
        .gaveta-scroll { overflow-y: auto; max-height: 85vh; padding-bottom: 2rem; }
        /* Barra de rolagem customizada para o dropdown múltiplo */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased font-sans" x-data="appTO()" x-init="buscarPacientes()">

    <header class="bg-clinica-600 text-white shadow-md sticky top-0 z-30">
        <div class="px-5 py-4 flex justify-between items-center">
            <h1 class="text-xl font-extrabold tracking-wide flex items-center gap-2">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                APP-TO
            </h1>
            <div class="w-9 h-9 bg-white/20 rounded-full flex items-center justify-center backdrop-blur-sm">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
            </div>
        </div>
    </header>

    <main class="p-4 pb-28">
        
        <section class="mb-6 bg-gradient-to-br from-white to-clinica-50 p-5 rounded-3xl shadow-sm border border-clinica-100">
            <div class="flex items-center justify-between">
                <div>
                    <h2 class="text-xs text-clinica-600 font-bold uppercase tracking-wider mb-1">Glossário Rápido</h2>
                    <span class="text-slate-800 font-bold text-lg">Somatodispraxia</span>
                </div>
                <button @click="abrirGlossario('Somatodispraxia', 'É um tipo grave de dispraxia. Ocorre devido ao processamento deficiente das informações táteis e proprioceptivas. A criança parece desajeitada, esbarra em coisas e tem extrema dificuldade em aprender novas sequências motoras.')" 
                        class="w-10 h-10 rounded-full bg-white text-clinica-600 flex items-center justify-center shadow-sm hover:scale-105 transition-transform">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </button>
            </div>
        </section>

        <section>
            <div class="flex justify-between items-end mb-4 px-1">
                <h2 class="text-xl font-bold text-slate-800">Prontuários</h2>
                <span class="text-sm text-slate-500 font-medium" x-text="pacientes.length + ' ativos'"></span>
            </div>

            <template x-if="carregando">
                <div class="flex justify-center py-10"><div class="animate-spin rounded-full h-10 w-10 border-b-2 border-clinica-600"></div></div>
            </template>

            <div class="space-y-4">
                <template x-for="paciente in pacientes" :key="paciente.id">
                    <div @click="window.location.href = '/paciente/' + paciente.id" 
                         class="bg-white p-4 rounded-3xl shadow-sm border border-slate-100 flex items-center gap-4 active:scale-[0.98] transition-transform cursor-pointer hover:border-clinica-300">
                        <div class="w-14 h-14 rounded-full bg-clinica-100 flex items-center justify-center text-clinica-600 font-black text-xl shadow-inner uppercase" x-text="paciente.nome.charAt(0)"></div>
                        <div class="flex-1 min-w-0">
                            <h3 class="font-bold text-slate-800 text-lg truncate" x-text="paciente.nome"></h3>
                            <div class="flex items-center gap-2 mt-1">
                                <span class="bg-slate-100 text-slate-500 text-xs px-2 py-1 rounded-md font-medium truncate max-w-full" x-text="paciente.diagnostico || 'Avaliação Inicial'"></span>
                            </div>
                        </div>
                        <div class="w-10 h-10 flex items-center justify-center text-clinica-500 shrink-0">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                        </div>
                    </div>
                </template>

                <template x-if="!carregando && pacientes.length === 0">
                    <div class="text-center py-12 bg-white rounded-3xl border border-slate-200 border-dashed">
                        <div class="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-3">
                            <svg class="w-8 h-8 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                        </div>
                        <p class="text-slate-500 font-medium">Nenhum paciente cadastrado.</p>
                        <p class="text-sm text-slate-400 mt-1">Clique no + para começar.</p>
                    </div>
                </template>
            </div>
        </section>
    </main>

    <button @click="abrirModalCadastro()" class="fixed bottom-6 right-6 w-16 h-16 bg-clinica-600 text-white rounded-2xl shadow-lg shadow-clinica-600/40 flex items-center justify-center hover:bg-clinica-700 active:scale-95 transition-all z-30">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
    </button>

    <div x-show="modalCadastroAberto" style="display: none;" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-40" x-transition.opacity @click="modalCadastroAberto = false"></div>
    <div x-show="modalCadastroAberto" style="display: none;" class="fixed bottom-0 left-0 right-0 bg-white rounded-t-[2rem] z-50 shadow-2xl gaveta-scroll"
         x-transition:enter="transition ease-out duration-300 transform" x-transition:enter-start="translate-y-full" x-transition:enter-end="translate-y-0"
         x-transition:leave="transition ease-in duration-200 transform" x-transition:leave-start="translate-y-0" x-transition:leave-end="translate-y-full">
        
        <div class="sticky top-0 bg-white/95 backdrop-blur-sm pt-4 pb-2 px-6 border-b border-slate-100 z-10 flex justify-between items-center">
            <h3 class="text-xl font-extrabold text-slate-800">Novo Paciente</h3>
            <button @click="modalCadastroAberto = false" class="w-8 h-8 bg-slate-100 rounded-full flex items-center justify-center text-slate-500 font-bold">✕</button>
        </div>

        <form @submit.prevent="salvarPaciente" class="p-6 space-y-4">
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-1">Nome Completo</label>
                <input type="text" x-model="novoPaciente.nome" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-clinica-500 transition-shadow">
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1">Data Nasc.</label>
                    <input type="date" x-model="novoPaciente.data_nascimento" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-clinica-500 transition-shadow">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1">Escolaridade</label>
                    <input type="text" x-model="novoPaciente.escolaridade" placeholder="Ex: Pré-escola" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-clinica-500 transition-shadow">
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 mb-1">Diagnóstico Clínico / Disfunções</label>
                <div class="relative" x-data="{ open: false }">
                    <button type="button" @click="open = !open" @click.away="open = false" 
                            class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-left flex justify-between items-center focus:outline-none focus:ring-2 focus:ring-clinica-500 transition-shadow">
                        <span class="truncate text-slate-700 font-medium" 
                              x-text="diagnosticosSelecionados.length === 0 ? 'Selecione uma ou mais opções...' : diagnosticosSelecionados.join(', ')">
                        </span>
                        <svg class="h-5 w-5 text-slate-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" :class="{'rotate-180': open, 'transition-transform': true}"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </button>

                    <div x-show="open" style="display: none;" 
                         class="absolute z-20 mt-1 w-full bg-white border border-slate-200 rounded-xl shadow-xl max-h-60 overflow-y-auto custom-scrollbar p-2">
                        <template x-for="opcao in listaDisfuncoes" :key="opcao">
                            <label class="flex items-center gap-3 p-3 hover:bg-clinica-50 rounded-lg cursor-pointer transition-colors border-b border-slate-50 last:border-0">
                                <input type="checkbox" :value="opcao" x-model="diagnosticosSelecionados" class="w-5 h-5 text-clinica-600 border-slate-300 rounded focus:ring-clinica-500 accent-clinica-600">
                                <span class="text-sm font-semibold text-slate-700" x-text="opcao"></span>
                            </label>
                        </template>
                    </div>
                </div>
            </div>

            <div x-show="diagnosticosSelecionados.length > 0" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 -translate-y-2" x-transition:enter-end="opacity-100 translate-y-0" style="display: none;" class="p-4 bg-clinica-50 rounded-xl border border-clinica-100">
                <label class="block text-sm font-bold text-clinica-900 mb-1">Comorbidades Associadas (Outros)</label>
                <input type="text" x-model="outrosDiagnosticos" placeholder="Ex: Ansiedade, Epilepsia, etc..." class="w-full bg-white border border-clinica-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-clinica-500 text-slate-700">
                <p class="text-xs text-clinica-600 mt-1 font-medium">Opcional. Adicione condições não listadas acima.</p>
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 mb-1 mt-2">Queixa Principal</label>
                <textarea x-model="novoPaciente.queixa_principal" rows="3" placeholder="O que trouxe a família à clínica?" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-clinica-500 transition-shadow"></textarea>
            </div>

            <button type="submit" :disabled="salvando || diagnosticosSelecionados.length === 0" class="w-full bg-clinica-600 text-white font-extrabold py-4 rounded-xl active:bg-clinica-700 transition-colors mt-4 flex justify-center items-center disabled:opacity-50 disabled:cursor-not-allowed shadow-md">
                <span x-show="!salvando">Salvar Prontuário</span>
                <div x-show="salvando" class="animate-spin rounded-full h-6 w-6 border-b-2 border-white"></div>
            </button>
        </form>
    </div>

    <div x-show="sheetAberto" style="display: none;" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-40" x-transition.opacity @click="sheetAberto = false"></div>
    <div x-show="sheetAberto" style="display: none;" class="fixed bottom-0 left-0 right-0 bg-white rounded-t-[2rem] z-50 p-6 shadow-2xl"
         x-transition:enter="transition ease-out duration-300 transform" x-transition:enter-start="translate-y-full" x-transition:enter-end="translate-y-0"
         x-transition:leave="transition ease-in duration-200 transform" x-transition:leave-start="translate-y-0" x-transition:leave-end="translate-y-full">
        <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-5"></div>
        <h3 class="text-2xl font-black text-slate-800 mb-2" x-text="termoAtual"></h3>
        <p class="text-slate-600 text-lg leading-relaxed mb-8" x-text="definicaoAtual"></p>
        <button @click="sheetAberto = false" class="w-full bg-slate-100 text-slate-800 font-bold py-4 rounded-xl active:bg-slate-200 transition-colors">Fechar</button>
    </div>

    <script>
        function appTO() {
            return {
                pacientes: [],
                carregando: true,
                sheetAberto: false, 
                termoAtual: '', 
                definicaoAtual: '',
                modalCadastroAberto: false,
                salvando: false,
                
                // Dados originais do paciente
                novoPaciente: { nome: '', data_nascimento: '', escolaridade: '', queixa_principal: '' },
                
                // Controle do Diagnóstico Múltiplo
                diagnosticosSelecionados: [],
                outrosDiagnosticos: '',
                listaDisfuncoes: [
                    "TEA (Transtorno do Espectro Autista)",
                    "TDAH (Transtorno de Déficit de Atenção)",
                    "Atraso do Desenvolvimento Motor",
                    "TPS (Transtorno do Processamento Sensorial)",
                    "Dispraxia / TDC",
                    "Paralisia Cerebral",
                    "Síndrome de Down",
                    "Síndrome de Tourette",
                    "TOD (Transtorno Opositivo Desafiador)",
                    "Deficiência Intelectual",
                    "Em Investigação / Sem Laudo"
                ],

                abrirGlossario(termo, definicao) {
                    this.termoAtual = termo; 
                    this.definicaoAtual = definicao; 
                    this.sheetAberto = true;
                },

                abrirModalCadastro() {
                    this.novoPaciente = { nome: '', data_nascimento: '', escolaridade: '', queixa_principal: '' };
                    this.diagnosticosSelecionados = [];
                    this.outrosDiagnosticos = '';
                    this.modalCadastroAberto = true;
                },

                buscarPacientes() {
                    this.carregando = true;
                    fetch('/api/pacientes/')
                        .then(res => res.json())
                        .then(data => { this.pacientes = data; this.carregando = false; })
                        .catch(err => { console.error(err); this.carregando = false; });
                },

                salvarPaciente() {
                    this.salvando = true;
                    
                    // Monta a string final unindo as checkboxes selecionadas e o campo Outros
                    let diagFinal = this.diagnosticosSelecionados.join(', ');
                    if (this.outrosDiagnosticos.trim() !== '') {
                        diagFinal += ' | Outros: ' + this.outrosDiagnosticos.trim();
                    }
                    
                    // Clona os dados e injeta a string montada
                    const payload = { ...this.novoPaciente, diagnostico: diagFinal };

                    fetch('/api/pacientes/', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    })
                    .then(res => {
                        if (!res.ok) throw new Error('Falha ao salvar');
                        return res.json();
                    })
                    .then(data => {
                        this.modalCadastroAberto = false;
                        this.salvando = false;
                        this.buscarPacientes();
                    })
                    .catch(err => {
                        console.error(err);
                        alert('Erro ao salvar paciente. Verifique os dados.');
                        this.salvando = false;
                    });
                }
            }
        }
    </script>
</body>
</html>
