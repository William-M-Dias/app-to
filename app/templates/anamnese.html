<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Triagem Inicial | APP-TO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>body { background-color: #f8fafc; font-family: 'Nunito', sans-serif; }</style>
</head>
<body class="text-slate-800 antialiased" x-data="formTriagem({{ paciente_id }})">

    <div class="max-w-4xl mx-auto min-h-screen bg-white md:shadow-2xl md:shadow-slate-200/50 md:border-x border-slate-100 relative pb-32">
        
        <header class="bg-orange-500 text-white p-4 sticky top-0 z-50 shadow-lg md:rounded-b-2xl">
            <div class="flex items-center gap-3">
                <a :href="'/paciente/' + pacienteId" class="p-2 hover:bg-white/20 rounded-full transition-all">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </a>
                <h1 class="text-xl font-black uppercase tracking-wide">Triagem Inicial</h1>
            </div>
        </header>

        <main class="p-6 space-y-4">
            <div class="bg-white rounded-3xl border border-slate-200 overflow-hidden shadow-sm">
                <button @click="abrirSecao('avds')" class="w-full bg-orange-50 p-5 font-black text-orange-800 flex justify-between items-center transition-colors">
                    <span>1. Atividades de Vida Diária (AVDs)</span><span x-text="secao === 'avds' ? '▲' : '▼'"></span>
                </button>
                <div x-show="secao === 'avds'" x-collapse class="p-4 space-y-3 bg-white">
                    <template x-for="item in ['Seletividade alimentar (recusa texturas/cores)', 'Dificuldade extrema em iniciar/manter o sono', 'Resistência a cortar unhas/cabelo ou lavar a cabeça', 'Não se veste sozinho / Irrita-se com etiquetas', 'Desfralde tardio ou escapes frequentes']">
                        <label class="flex items-start gap-4 p-4 bg-slate-50 rounded-2xl border border-slate-100 cursor-pointer hover:bg-orange-50 transition-colors">
                            <input type="checkbox" :value="item" x-model="form.dados_triagem.avds" class="w-6 h-6 mt-0.5 accent-orange-500 rounded-lg">
                            <span class="text-sm font-bold text-slate-600" x-text="item"></span>
                        </label>
                    </template>
                </div>
            </div>

            <div class="bg-white rounded-3xl border border-slate-200 overflow-hidden shadow-sm">
                <button @click="abrirSecao('sensorial')" class="w-full bg-emerald-50 p-5 font-black text-emerald-800 flex justify-between items-center transition-colors">
                    <span>2. Perfil Sensorial (TEA / TPS)</span><span x-text="secao === 'sensorial' ? '▲' : '▼'"></span>
                </button>
                <div x-show="secao === 'sensorial'" x-collapse class="p-4 space-y-3 bg-white">
                    <template x-for="item in ['Tapa os ouvidos para sons altos', 'Agitação motora constante', 'Busca impacto (esbarra nas coisas)', 'Anda na ponta dos pés frequentemente', 'Cheira ou lambe objetos não comestíveis', 'Baixa reação à dor']">
                        <label class="flex items-start gap-4 p-4 bg-slate-50 rounded-2xl border border-slate-100 cursor-pointer hover:bg-emerald-50 transition-colors">
                            <input type="checkbox" :value="item" x-model="form.dados_triagem.sensorial" class="w-6 h-6 mt-0.5 accent-emerald-500 rounded-lg">       
                            <span class="text-sm font-bold text-slate-600" x-text="item"></span>
                        </label>
                    </template>
                </div>
            </div>

            <div class="bg-white rounded-3xl border border-slate-200 overflow-hidden shadow-sm">
                <button @click="abrirSecao('comportamento')" class="w-full bg-red-50 p-5 font-black text-red-800 flex justify-between items-center transition-colors">
                    <span>3. Comportamento e Regulação</span><span x-text="secao === 'comportamento' ? '▲' : '▼'"></span>
                </button>
                <div x-show="secao === 'comportamento'" x-collapse class="p-4 space-y-3 bg-white">
                    <template x-for="item in ['TOD: Desafia regras e adultos ativamente', 'TDAH: Age sem pensar no perigo', 'TEA: Crises severas (Meltdowns)', 'Tourette: Tiques motores ou vocais', 'Baixíssima tolerância à frustração']">
                        <label class="flex items-start gap-4 p-4 bg-slate-50 rounded-2xl border border-slate-100 cursor-pointer hover:bg-red-50 transition-colors">
                            <input type="checkbox" :value="item" x-model="form.dados_triagem.comportamento" class="w-6 h-6 mt-0.5 accent-red-500 rounded-lg">       
                            <span class="text-sm font-bold text-slate-600" x-text="item"></span>
                        </label>
                    </template>
                </div>
            </div>

            <div class="bg-white rounded-3xl border border-slate-200 overflow-hidden shadow-sm">
                <button @click="abrirSecao('social_motor')" class="w-full bg-blue-50 p-5 font-black text-blue-800 flex justify-between items-center transition-colors">
                    <span>4. Social, Brincar e Práxis Motora</span><span x-text="secao === 'social_motor' ? '▲' : '▼'"></span>
                </button>
                <div x-show="secao === 'social_motor'" x-collapse class="p-4 space-y-3 bg-white">
                    <template x-for="item in ['Evita contacto visual prolongado', 'Brincar atípico (alinha peças)', 'Linguagem literal', 'Dispraxia: Cai muito / Desajeitado', 'Foge de atividades com lápis ou tesoura']">
                        <label class="flex items-start gap-4 p-4 bg-slate-50 rounded-2xl border border-slate-100 cursor-pointer hover:bg-blue-50 transition-colors">
                            <input type="checkbox" :value="item" x-model="form.dados_triagem.social_motor" class="w-6 h-6 mt-0.5 accent-blue-500 rounded-lg">       
                            <span class="text-sm font-bold text-slate-600" x-text="item"></span>
                        </label>
                    </template>
                </div>
            </div>

            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                <label class="block text-xs font-black text-slate-400 mb-2 uppercase tracking-widest">Queixa Principal (Resumo da Família)</label>
                <textarea x-model="form.queixa_principal" rows="4" placeholder="Ex: A mãe relata que a criança..." class="w-full p-4 bg-slate-50 rounded-2xl border-none text-sm font-bold focus:ring-2 focus:ring-orange-500 outline-none resize-none shadow-inner"></textarea>
            </div>
        </main>

        <div class="fixed bottom-0 max-w-4xl w-full p-4 bg-white/90 backdrop-blur-md border-t z-50">
            <button @click="salvarAnamnese" class="w-full bg-orange-500 text-white font-black py-4 rounded-2xl shadow-xl active:scale-95 transition-all uppercase tracking-widest text-sm">
                Gravar Mapa Clínico
            </button>
        </div>
    </div>

    <script>
        function formTriagem(id) {
            return {
                pacienteId: id,
                secao: 'avds',
                form: { dados_triagem: { avds: [], sensorial: [], comportamento: [], social_motor: [] }, queixa_principal: '' },
                abrirSecao(nome) { this.secao = this.secao === nome ? '' : nome; },
                salvarAnamnese() {
                    fetch('/api/anamnese/' + this.pacienteId, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(this.form)
                    }).then(res => res.json()).then(data => {
                        if(data.mensagem) { alert('Sucesso!'); window.location.href = '/paciente/' + this.pacienteId; }
                    });
                }
            }
        }
    </script>
</body>
</html>
