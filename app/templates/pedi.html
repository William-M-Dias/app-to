<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Avaliação PEDI | APP-TO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 text-slate-800 antialiased font-sans" x-data="avaliacaoPedi({{ paciente_id }})">

    <div class="max-w-4xl mx-auto min-h-screen bg-white md:shadow-2xl md:shadow-slate-200/50 md:border-x border-slate-100 relative pb-32">
        
        <header class="bg-blue-600 text-white shadow-md sticky top-0 z-30 md:rounded-b-2xl">
            <div class="px-5 py-5 flex items-center gap-4">
                <a :href="'/paciente/' + pacienteId" class="p-2 -ml-2 hover:bg-white/20 rounded-full transition-all">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>
                </a>
                <div>
                    <h1 class="text-xl font-black uppercase tracking-widest">Anamnese PEDI</h1>
                    <p class="text-blue-200 text-[10px] font-black uppercase tracking-[0.2em] opacity-80">Habilidades Funcionais</p>
                </div>
            </div>
        </header>

        <main class="p-6 space-y-6">
            <form @submit.prevent="salvarAvaliacao" class="space-y-6">
                <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 group hover:border-blue-200 transition-colors">
                    <div class="flex items-center gap-4 mb-5">
                        <div class="w-12 h-12 rounded-2xl bg-blue-50 flex items-center justify-center text-blue-500 shadow-inner">
                            <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"></path></svg>
                        </div>
                        <h2 class="font-black text-lg text-slate-800 uppercase tracking-tight">Autocuidado</h2>
                    </div>
                    <label class="block text-xs font-black text-slate-400 mb-3 uppercase tracking-widest flex justify-between">
                        Nível de Independência <span class="text-blue-600 font-black text-sm" x-text="form.score_autocuidado + '%'"></span>
                    </label>
                    <input type="range" min="0" max="100" step="5" x-model="form.score_autocuidado" class="w-full h-3 bg-slate-100 rounded-full appearance-none cursor-pointer accent-blue-600">
                    <div class="flex justify-between text-[10px] text-slate-400 mt-3 font-black uppercase tracking-widest px-1">
                        <span>Dependente</span>
                        <span>Independente</span>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 group hover:border-emerald-200 transition-colors">
                    <div class="flex items-center gap-4 mb-5">
                        <div class="w-12 h-12 rounded-2xl bg-emerald-50 flex items-center justify-center text-emerald-500 shadow-inner">
                            <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                        </div>
                        <h2 class="font-black text-lg text-slate-800 uppercase tracking-tight">Mobilidade</h2>
                    </div>
                    <label class="block text-xs font-black text-slate-400 mb-3 uppercase tracking-widest flex justify-between">
                        Nível de Independência <span class="text-emerald-600 font-black text-sm" x-text="form.score_mobilidade + '%'"></span>
                    </label>
                    <input type="range" min="0" max="100" step="5" x-model="form.score_mobilidade" class="w-full h-3 bg-slate-100 rounded-full appearance-none cursor-pointer accent-emerald-600">
                    <div class="flex justify-between text-[10px] text-slate-400 mt-3 font-black uppercase tracking-widest px-1">
                        <span>Dependente</span>
                        <span>Independente</span>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 group hover:border-purple-200 transition-colors">
                    <div class="flex items-center gap-4 mb-5">
                        <div class="w-12 h-12 rounded-2xl bg-purple-50 flex items-center justify-center text-purple-500 shadow-inner">
                            <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                        </div>
                        <h2 class="font-black text-lg text-slate-800 uppercase tracking-tight">Função Social</h2>
                    </div>
                    <label class="block text-xs font-black text-slate-400 mb-3 uppercase tracking-widest flex justify-between">
                        Nível de Independência <span class="text-purple-600 font-black text-sm" x-text="form.score_funcao_social + '%'"></span>
                    </label>
                    <input type="range" min="0" max="100" step="5" x-model="form.score_funcao_social" class="w-full h-3 bg-slate-100 rounded-full appearance-none cursor-pointer accent-purple-600">
                    <div class="flex justify-between text-[10px] text-slate-400 mt-3 font-black uppercase tracking-widest px-1">
                        <span>Dependente</span>
                        <span>Independente</span>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 space-y-4">
                    <div>
                        <label class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-2 px-1">Assistência do Cuidador</label>
                        <select x-model="form.assistencia_cuidador" class="w-full bg-slate-50 border-none rounded-2xl px-5 py-4 text-sm font-bold text-slate-700 outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                            <option value="" disabled selected>Selecione...</option>
                            <option value="Total">Total (Dependente)</option>
                            <option value="Máxima">Máxima Assistência</option>
                            <option value="Moderada">Moderada Assistência</option>
                            <option value="Mínima">Mínima Assistência</option>
                            <option value="Supervisão">Supervisão / Dica Verbal</option>
                            <option value="Independente">Independente</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-2 px-1">Notas Clínicas</label>
                        <textarea x-model="form.observacoes" rows="3" placeholder="Anotações sobre autonomia..." class="w-full bg-slate-50 border-none rounded-2xl px-5 py-4 text-sm font-bold text-slate-700 outline-none focus:ring-2 focus:ring-blue-500 shadow-inner resize-none"></textarea>
                    </div>
                </div>

                <div class="fixed bottom-0 max-w-4xl w-full p-4 bg-white/90 backdrop-blur-md border-t z-50">
                    <button type="submit" :disabled="salvando" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-xl active:scale-95 transition-all uppercase tracking-widest text-sm flex justify-center items-center">
                        <span x-show="!salvando">Salvar Avaliação PEDI</span>
                        <div x-show="salvando" class="animate-spin rounded-full h-5 w-5 border-b-2 border-white"></div>
                    </button>
                </div>
            </form>
        </main>
    </div>

    <script>
        function avaliacaoPedi(id) {
            return {
                pacienteId: id,
                salvando: false,
                form: { score_autocuidado: 50, score_mobilidade: 50, score_funcao_social: 50, assistencia_cuidador: '', observacoes: '' },
                salvarAvaliacao() {
                    this.salvando = true;
                    fetch('/api/pedi/' + this.pacienteId, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(this.form)
                    }).then(res => res.json()).then(() => {
                        alert('Avaliação Salva!'); window.location.href = '/paciente/' + this.pacienteId;
                    }).catch(() => { this.salvando = false; });
                }
            }
        }
    </script>
</body>
</html>
