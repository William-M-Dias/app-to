<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Avaliação PEDI | APP-TO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { clinica: { 50: '#f0fdfa', 100: '#ccfbf1', 500: '#14b8a6', 600: '#0d9488', 900: '#134e4a' } } } }
        }
    </script>
    <style>body { overscroll-behavior-y: contain; -webkit-tap-highlight-color: transparent; }</style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased font-sans" x-data="avaliacaoPedi({{ paciente_id }})">

    <header class="bg-blue-600 text-white shadow-md sticky top-0 z-30">
        <div class="px-4 py-4 flex items-center gap-3">
            <a :href="'/paciente/' + pacienteId" class="p-2 -ml-2 hover:bg-white/20 rounded-full transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            </a>
            <div>
                <h1 class="text-xl font-extrabold tracking-wide leading-tight">Anamnese PEDI</h1>
                <p class="text-blue-200 text-xs font-medium">Habilidades Funcionais</p>
            </div>
        </div>
    </header>

    <main class="p-4 pb-28 space-y-6">
        
        <form @submit.prevent="salvarAvaliacao" class="space-y-6">
            
            <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                <div class="flex items-center gap-3 mb-4">
                    <div class="w-10 h-10 rounded-full bg-blue-50 flex items-center justify-center text-blue-500">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"></path></svg>
                    </div>
                    <h2 class="font-bold text-lg text-slate-800">Autocuidado</h2>
                </div>
                <label class="block text-sm font-semibold text-slate-600 mb-2 flex justify-between">
                    Nível de Independência <span class="text-blue-600 font-bold" x-text="form.score_autocuidado + '%'"></span>
                </label>
                <input type="range" min="0" max="100" step="5" x-model="form.score_autocuidado" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
                <div class="flex justify-between text-xs text-slate-400 mt-2 font-medium">
                    <span>Dependente</span>
                    <span>Independente</span>
                </div>
            </div>

            <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                <div class="flex items-center gap-3 mb-4">
                    <div class="w-10 h-10 rounded-full bg-emerald-50 flex items-center justify-center text-emerald-500">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    </div>
                    <h2 class="font-bold text-lg text-slate-800">Mobilidade</h2>
                </div>
                <label class="block text-sm font-semibold text-slate-600 mb-2 flex justify-between">
                    Nível de Independência <span class="text-emerald-600 font-bold" x-text="form.score_mobilidade + '%'"></span>
                </label>
                <input type="range" min="0" max="100" step="5" x-model="form.score_mobilidade" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-emerald-600">
                <div class="flex justify-between text-xs text-slate-400 mt-2 font-medium">
                    <span>Dependente</span>
                    <span>Independente</span>
                </div>
            </div>

            <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                <div class="flex items-center gap-3 mb-4">
                    <div class="w-10 h-10 rounded-full bg-purple-50 flex items-center justify-center text-purple-500">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                    </div>
                    <h2 class="font-bold text-lg text-slate-800">Função Social</h2>
                </div>
                <label class="block text-sm font-semibold text-slate-600 mb-2 flex justify-between">
                    Nível de Independência <span class="text-purple-600 font-bold" x-text="form.score_funcao_social + '%'"></span>
                </label>
                <input type="range" min="0" max="100" step="5" x-model="form.score_funcao_social" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-purple-600">
                <div class="flex justify-between text-xs text-slate-400 mt-2 font-medium">
                    <span>Dependente</span>
                    <span>Independente</span>
                </div>
            </div>

            <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 space-y-4">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Assistência do Cuidador</label>
                    <select x-model="form.assistencia_cuidador" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 appearance-none focus:outline-none focus:ring-2 focus:ring-blue-500 text-slate-700">
                        <option value="" disabled selected>Selecione...</option>
                        <option value="Total">Total (Cuidador faz tudo)</option>
                        <option value="Máxima">Máxima</option>
                        <option value="Moderada">Moderada</option>
                        <option value="Mínima">Mínima</option>
                        <option value="Supervisão">Supervisão / Dica Verbal</option>
                        <option value="Independente">Independente</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Observações Clínicas (PEDI)</label>
                    <textarea x-model="form.observacoes" rows="3" placeholder="Anotações sobre uso de utensílios, vestuário, comunicação, etc." class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                </div>
            </div>

            <div class="fixed bottom-0 left-0 right-0 p-4 bg-white/90 backdrop-blur-md border-t border-slate-100 z-40">
                <button type="submit" :disabled="salvando" class="w-full bg-blue-600 text-white font-extrabold py-4 rounded-xl active:bg-blue-700 transition-colors shadow-lg shadow-blue-600/30 flex justify-center items-center">
                    <span x-show="!salvando">Salvar Avaliação PEDI</span>
                    <div x-show="salvando" class="animate-spin rounded-full h-6 w-6 border-b-2 border-white"></div>
                </button>
            </div>
        </form>
    </main>

    <script>
        function avaliacaoPedi(id) {
            return {
                pacienteId: id,
                salvando: false,
                form: {
                    score_autocuidado: 50,
                    score_mobilidade: 50,
                    score_funcao_social: 50,
                    assistencia_cuidador: '',
                    observacoes: ''
                },

                salvarAvaliacao() {
                    this.salvando = true;
                    fetch('/api/pedi/' + this.pacienteId, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(this.form)
                    })
                    .then(res => {
                        if (!res.ok) throw new Error('Falha ao salvar');
                        return res.json();
                    })
                    .then(data => {
                        alert('Avaliação Salva com Sucesso!');
                        window.location.href = '/paciente/' + this.pacienteId;
                    })
                    .catch(err => {
                        console.error(err);
                        alert('Erro ao salvar avaliação.');
                        this.salvando = false;
                    });
                }
            }
        }
    </script>
</body>
</html>
