<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório Clínico | APP-TO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', sans-serif; background-color: #f8fafc; }
        /* A mágica acontece aqui: Configuração exclusiva para Impressão/PDF */
        @media print {
            body { background-color: white; }
            .no-print { display: none !important; }
            .page-break { page-break-before: always; }
            .print-shadow-none { box-shadow: none !important; border: 1px solid #e2e8f0; }
        }
    </style>
</head>
<body class="text-slate-800 antialiased" x-data="relatorio({{ paciente_id }})" x-init="carregarDados()">
    
    <div class="no-print fixed bottom-6 right-6 flex gap-3 z-50">
        <button @click="window.history.back()" class="bg-slate-800 text-white px-6 py-3 rounded-2xl font-black shadow-lg hover:scale-105 transition-transform">Voltar</button>
        <button @click="window.print()" class="bg-teal-600 text-white px-6 py-3 rounded-2xl font-black shadow-lg hover:scale-105 transition-transform flex items-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
            Gerar PDF
        </button>
    </div>

    <template x-if="carregando">
        <div class="flex items-center justify-center min-h-screen">
            <div class="animate-spin rounded-full h-12 w-12 border-b-4 border-teal-600"></div>
        </div>
    </template>

    <template x-if="!carregando && paciente">
        <div class="max-w-4xl mx-auto bg-white min-h-screen p-10 md:p-16 print-shadow-none shadow-xl">
            
            <div class="border-b-2 border-slate-200 pb-6 mb-8 text-center">
                <h1 class="text-3xl font-black text-slate-800 tracking-tight uppercase">Relatório de Evolução Terapêutica</h1>
                <p class="text-slate-500 font-bold mt-1 uppercase tracking-widest text-xs">Terapia Ocupacional Pediátrica</p>
            </div>

            <div class="bg-slate-50 p-6 rounded-2xl border border-slate-100 mb-8 print-shadow-none">
                <h2 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-4 border-b pb-2">Identificação</h2>
                <div class="grid grid-cols-2 gap-4">
                    <div><span class="text-[10px] text-slate-500 uppercase block mb-0.5">Nome da Criança</span><span class="font-bold text-slate-800" x-text="paciente.nome"></span></div>
                    <div><span class="text-[10px] text-slate-500 uppercase block mb-0.5">Idade</span><span class="font-bold text-slate-800" x-text="calcularIdade(paciente.data_nascimento)"></span></div>
                    <div><span class="text-[10px] text-slate-500 uppercase block mb-0.5">Diagnóstico Base</span><span class="font-bold text-slate-800" x-text="paciente.diagnostico || 'Não informado'"></span></div>
                    <div><span class="text-[10px] text-slate-500 uppercase block mb-0.5">Data de Emissão</span><span class="font-bold text-slate-800" x-text="new Date().toLocaleDateString('pt-BR')"></span></div>
                </div>
            </div>

            <div class="mb-8">
                <h2 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-2">Histórico Inicial</h2>
                <p class="text-sm font-semibold text-slate-700 leading-relaxed bg-slate-50 p-4 rounded-xl border border-slate-100" x-text="paciente.queixa_principal || 'Sem queixas registadas inicialmente.'"></p>
            </div>

            <template x-if="ultimaAnamnese && ultimaAnamnese.dados">
                <div class="mb-8">
                    <h2 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-3">Síntese do Perfil Inicial</h2>
                    <div class="grid grid-cols-2 gap-4">
                        <template x-if="ultimaAnamnese.dados.sensorial && ultimaAnamnese.dados.sensorial.length > 0">
                            <div class="p-4 border border-slate-200 rounded-xl">
                                <h3 class="text-[10px] font-bold text-emerald-600 uppercase mb-2">Perfil Sensorial</h3>
                                <ul class="list-disc pl-4 text-xs font-semibold text-slate-700 space-y-1">
                                    <template x-for="item in ultimaAnamnese.dados.sensorial"><li x-text="item"></li></template>
                                </ul>
                            </div>
                        </template>
                        <template x-if="ultimaAnamnese.dados.comportamento && ultimaAnamnese.dados.comportamento.length > 0">
                            <div class="p-4 border border-slate-200 rounded-xl">
                                <h3 class="text-[10px] font-bold text-red-600 uppercase mb-2">Comportamento</h3>
                                <ul class="list-disc pl-4 text-xs font-semibold text-slate-700 space-y-1">
                                    <template x-for="item in ultimaAnamnese.dados.comportamento"><li x-text="item.split(':')[0]"></li></template>
                                </ul>
                            </div>
                        </template>
                    </div>
                </div>
            </template>

            <template x-if="avaliacoesPedi.length > 0">
                <div class="mb-8 page-break">
                    <h2 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-4 border-b pb-2">Desempenho Funcional (Escala PEDI)</h2>
                    <div class="space-y-4">
                        <template x-for="ava in avaliacoesPedi">
                            <div class="p-4 bg-slate-50 border border-slate-100 rounded-xl">
                                <div class="flex justify-between mb-3 border-b border-slate-200 pb-2">
                                    <span class="text-xs font-bold text-slate-600">Avaliação em: <span x-text="ava.data_avaliacao"></span></span>
                                    <span class="text-[10px] font-black uppercase text-blue-600" x-text="'Assistência: ' + ava.assistencia_cuidador"></span>
                                </div>
                                <div class="grid grid-cols-3 gap-4 text-center">
                                    <div>
                                        <span class="block text-[10px] font-black text-slate-400 uppercase">Autocuidado</span>
                                        <span class="text-lg font-black text-slate-800" x-text="ava.score_autocuidado + '%'"></span>
                                    </div>
                                    <div>
                                        <span class="block text-[10px] font-black text-slate-400 uppercase">Mobilidade</span>
                                        <span class="text-lg font-black text-slate-800" x-text="ava.score_mobilidade + '%'"></span>
                                    </div>
                                    <div>
                                        <span class="block text-[10px] font-black text-slate-400 uppercase">Função Social</span>
                                        <span class="text-lg font-black text-slate-800" x-text="ava.score_funcao_social + '%'"></span>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </template>

            <div x-show="temDadosGrafico" style="display: none;" class="mb-8 page-break">
                <h2 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-4 border-b pb-2">Curva de Evolução (Índice GAS Médio)</h2>
                <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 print-shadow-none h-64 w-full">
                    <canvas id="gasChart"></canvas>
                </div>
            </div>

            <div class="mb-8">
                <h2 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-4 border-b pb-2">Resumo das Últimas Intervenções</h2>
                <div class="space-y-4">
                    <template x-for="evo in historicoEvolucoes.slice(0, 5)" :key="evo.id">
                        <div class="border-l-4 border-teal-500 pl-4 py-2 bg-slate-50 rounded-r-xl pr-4">
                            <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest" x-text="evo.data_hora"></span>
                            
                            <template x-if="evo.micro_metas && (evo.micro_metas.autocuidado !== null || evo.micro_metas.mobilidade !== null || evo.micro_metas.funcao_social !== null)">
                                <div class="flex flex-wrap gap-2 mt-2 mb-2">
                                    <template x-if="evo.micro_metas.autocuidado !== null">
                                        <span class="text-[9px] font-black uppercase px-2 py-1 rounded bg-teal-100 text-teal-800 border border-teal-200">
                                            Autocuidado: <span x-text="evo.micro_metas.autocuidado > 0 ? '+' + evo.micro_metas.autocuidado : evo.micro_metas.autocuidado"></span>
                                        </span>
                                    </template>
                                    <template x-if="evo.micro_metas.mobilidade !== null">
                                        <span class="text-[9px] font-black uppercase px-2 py-1 rounded bg-blue-100 text-blue-800 border border-blue-200">
                                            Mobilidade: <span x-text="evo.micro_metas.mobilidade > 0 ? '+' + evo.micro_metas.mobilidade : evo.micro_metas.mobilidade"></span>
                                        </span>
                                    </template>
                                    <template x-if="evo.micro_metas.funcao_social !== null">
                                        <span class="text-[9px] font-black uppercase px-2 py-1 rounded bg-rose-100 text-rose-800 border border-rose-200">
                                            Social: <span x-text="evo.micro_metas.funcao_social > 0 ? '+' + evo.micro_metas.funcao_social : evo.micro_metas.funcao_social"></span>
                                        </span>
                                    </template>
                                </div>
                            </template>

                            <p class="text-sm font-semibold text-slate-700 mt-2 whitespace-pre-line leading-relaxed" x-text="evo.evolucao_texto || 'Sessão estruturada realizada conforme plano terapêutico.'"></p>
                        </div>
                    </template>
                    <template x-if="historicoEvolucoes.length === 0">
                        <p class="text-sm text-slate-500 italic">Nenhuma evolução textual registada até o momento.</p>
                    </template>
                </div>
            </div>

            <div class="mt-24 pt-8 border-t border-slate-200 text-center page-break">
                <div class="w-72 border-b border-slate-800 mx-auto mb-2"></div>
                <p class="font-black text-slate-800 uppercase tracking-widest text-sm">Edna Nogueira</p>
                <p class="text-xs font-bold text-slate-500 uppercase tracking-widest mt-1">Terapeuta Ocupacional</p>
            </div>

        </div>
    </template>

    <script>
        function relatorio(id) {
            return {
                pacienteId: id, 
                paciente: null, 
                avaliacoesPedi: [], 
                ultimaAnamnese: null, 
                historicoEvolucoes: [], 
                carregando: true,
                temDadosGrafico: false, 
                
                carregarDados() {
                    Promise.all([
                        fetch('/api/pacientes/' + this.pacienteId).then(res => res.json()),
                        fetch('/api/pedi/' + this.pacienteId).then(res => res.json()),
                        fetch('/api/anamnese/' + this.pacienteId).then(res => res.json()),
                        fetch('/api/consultas/paciente/' + this.pacienteId).then(res => res.json())
                    ]).then(([dadosPaciente, dadosPedi, dadosAnamnese, dadosConsultas]) => {
                        this.paciente = dadosPaciente;
                        this.avaliacoesPedi = Array.isArray(dadosPedi) ? dadosPedi : [];
                        if (Array.isArray(dadosAnamnese) && dadosAnamnese.length > 0) this.ultimaAnamnese = dadosAnamnese[0];
                        
                        // CORREÇÃO AQUI: adicionado o .reverse() para pegar as mais recentes!
                        this.historicoEvolucoes = Array.isArray(dadosConsultas) ? dadosConsultas.filter(c => c.status === 'Realizado').reverse() : [];
                        
                        this.carregando = false;
                        
                        this.$nextTick(() => {
                            this.renderizarGrafico();
                        });
                    }).catch(err => {
                        console.error('Erro ao carregar relatório:', err);
                        this.carregando = false;
                    });
                },
                
                calcularIdade(dataNasc) {
                    if (!dataNasc) return '';
                    const hoje = new Date(); const nascimento = new Date(dataNasc);
                    let idade = hoje.getFullYear() - nascimento.getFullYear();
                    const mes = hoje.getMonth() - nascimento.getMonth();
                    if (mes < 0 || (mes === 0 && hoje.getDate() < nascimento.getDate())) { idade--; }
                    return idade + (idade === 1 ? ' ano' : ' anos');
                },

                renderizarGrafico() {
                    // Aqui precisa de reverse() novamente porque o array original já foi invertido acima,
                    // e o Chart.js desenha o eixo X da esquerda (antigo) para a direita (recente).
                    const evolucoesGAS = this.historicoEvolucoes.filter(e => 
                        e.micro_metas && 
                        (e.micro_metas.autocuidado !== null || e.micro_metas.mobilidade !== null || e.micro_metas.funcao_social !== null)
                    ).slice().reverse(); 

                    if (evolucoesGAS.length === 0) return;
                    
                    this.temDadosGrafico = true;

                    const labels = evolucoesGAS.map(e => {
                        return e.data_hora.split(' ')[0].split('-').reverse().slice(0, 2).join('/');
                    });

                    const dataEvolucao = evolucoesGAS.map(e => {
                        let sum = 0;
                        let count = 0;
                        if (e.micro_metas.autocuidado !== null && e.micro_metas.autocuidado !== undefined) { sum += e.micro_metas.autocuidado; count++; }
                        if (e.micro_metas.mobilidade !== null && e.micro_metas.mobilidade !== undefined) { sum += e.micro_metas.mobilidade; count++; }
                        if (e.micro_metas.funcao_social !== null && e.micro_metas.funcao_social !== undefined) { sum += e.micro_metas.funcao_social; count++; }
                        return count > 0 ? parseFloat((sum / count).toFixed(1)) : 0;
                    });

                    this.$nextTick(() => {
                        const ctx = document.getElementById('gasChart');
                        if (!ctx) return;

                        new Chart(ctx, {
                            type: 'line',
                            data: {
                                labels: labels,
                                datasets: [{
                                    label: 'Média GAS',
                                    data: dataEvolucao,
                                    borderColor: '#0d9488', 
                                    backgroundColor: 'rgba(13, 148, 136, 0.1)',
                                    borderWidth: 3,
                                    pointBackgroundColor: '#fff',
                                    pointBorderColor: '#0d9488',
                                    pointBorderWidth: 2,
                                    pointRadius: 4,
                                    fill: true,
                                    tension: 0.3
                                }]
                            },
                            options: {
                                responsive: true,
                                maintainAspectRatio: false,
                                scales: {
                                    y: {
                                        min: -2,
                                        max: 2,
                                        ticks: { stepSize: 1 }
                                    }
                                },
                                plugins: {
                                    legend: { display: false }
                                }
                            }
                        });
                    });
                }
            }
        }
    </script>
</body>
</html>
