<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Prontuário | APP-TO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { 
                extend: { 
                    fontFamily: { sans: ['Nunito', 'sans-serif'] },
                    colors: { 
                        clinica: { 50: '#f0fdfa', 100: '#ccfbf1', 500: '#14b8a6', 600: '#0d9488', 900: '#134e4a' } 
                    } 
                } 
            }
        }
    </script>
    <style>
        body { background-color: #f8fafc; overscroll-behavior-y: contain; -webkit-tap-highlight-color: transparent; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="text-slate-800 antialiased" x-data="perfilPaciente({{ paciente_id }})" x-init="carregarDados()">

    <div class="max-w-5xl mx-auto min-h-screen bg-white md:shadow-2xl md:shadow-slate-200/50 md:border-x border-slate-100 relative pb-20 md:pb-10">

        <header class="bg-clinica-600 text-white p-4 sticky top-0 z-50 shadow-md">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <a href="/" class="p-2 -ml-2 hover:bg-white/20 rounded-full transition-colors active:scale-95">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                    </a>
                    <h1 class="text-xl font-black uppercase tracking-widest">Prontuário</h1>
                </div>
                <div class="w-8 h-8 bg-white/20 rounded-lg flex items-center justify-center backdrop-blur-sm">
                    <svg class="w-5 h-5 text-white" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 2C8.13 2 5 5.13 5 9c0 2.38 1.19 4.47 3 5.74V17c0 1.1.9 2 2 2h4c1.1 0 2-.9 2-2v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.87-3.13-7-7-7z"/>
                    </svg>
                </div>
            </div>
        </header>

        <main class="p-4 md:p-6">
            <template x-if="carregando">
                <div class="flex flex-col items-center justify-center py-20">
                    <div class="animate-spin rounded-full h-12 w-12 border-b-4 border-clinica-600 mb-4"></div>
                    <p class="text-sm font-bold text-slate-400 uppercase tracking-widest animate-pulse">A aceder ao dossiê...</p>
                </div>
            </template>

            <template x-if="!carregando && paciente">
                
                <div class="flex flex-col md:flex-row gap-6 items-start">
                    
                    <aside class="w-full md:w-1/3 flex flex-col gap-4 md:sticky md:top-24">
                        
                        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 relative overflow-hidden text-center">
                            <div class="absolute top-0 right-0 w-32 h-32 bg-clinica-50 rounded-full -mr-10 -mt-10 opacity-50 pointer-events-none"></div>
                            
                            <div class="w-20 h-20 mx-auto rounded-full bg-clinica-100 flex items-center justify-center text-clinica-600 font-black text-3xl shadow-inner uppercase mb-4 relative z-10">
                                <span x-text="paciente.nome.charAt(0)"></span>
                            </div>
                            
                            <h2 class="font-black text-xl text-slate-800 leading-tight mb-1 relative z-10" x-text="paciente.nome"></h2>
                            <p class="text-clinica-600 font-bold text-sm mb-5 relative z-10" x-text="calcularIdade(paciente.data_nascimento)"></p>
                            
                            <div class="text-left space-y-4 pt-4 border-t border-slate-50 relative z-10">
                                <div>
                                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-0.5">Diagnóstico Base</span>
                                    <span class="text-sm font-black text-slate-700" x-text="paciente.diagnostico || 'Não informado'"></span>
                                </div>
                                
                                <div>
                                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-0.5">Motivo / Queixa Principal</span>
                                    <span class="text-sm font-semibold text-slate-600 leading-snug" x-text="paciente.queixa_principal || 'Nenhuma queixa registada.'"></span>
                                </div>

                                <div class="mt-2 p-4 bg-slate-50 rounded-2xl border border-slate-100">
                                    <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest block mb-2 border-b border-slate-200 pb-1">Responsável e Contato</span>
                                    <p class="text-xs font-black text-slate-700 mb-3 truncate" x-text="paciente.nome_responsavel || 'Não informado'"></p>
                                    
                                    <div class="grid grid-cols-2 gap-2">
                                        <template x-if="paciente.telefone_responsavel">
                                            <a :href="'https://wa.me/55' + paciente.telefone_responsavel.replace(/\D/g, '')" target="_blank" class="bg-white p-2 rounded-xl flex items-center justify-center gap-1 shadow-sm border border-slate-100 active:scale-95 transition-transform">
                                                <svg class="w-4 h-4 text-emerald-500" fill="currentColor" viewBox="0 0 24 24"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946C.161 5.383 5.513.031 12.066.031c3.172.001 6.156 1.237 8.401 3.484 2.246 2.248 3.481 5.232 3.481 8.402 0 6.553-5.352 11.905-11.903 11.905-2.008 0-3.974-.508-5.716-1.472L0 24zm6.594-2.22c1.614.957 3.518 1.463 5.462 1.463 5.86 0 10.626-4.766 10.627-10.625 0-2.839-1.106-5.509-3.114-7.518-2.008-2.008-4.678-3.113-7.516-3.113-5.861 0-10.627 4.767-10.627 10.627-.001 2.032.58 4.01 1.68 5.719L2.013 22.01l4.638-1.23zM16.96 14.18c-.37-.184-2.185-1.077-2.522-1.2-.338-.122-.585-.184-.83.184-.247.37-.954 1.2-.172 1.29.184.09 1.144.37 1.29.37.184 0 .338-.03.46-.184.123-.153.37-.46.37-.46s.338-.4.492-.122c.184.277.83 1.35.83 1.35l.03.03s.03.03.06.06c.03.03.06.03.09.06s.03.03.06.06l.03.03c.37.184.585.308.738.4.154.09.277.153.37-.184.09-.37.37-1.35.37-1.35l.03-.03s.03-.03.03-.06c0-.03.03-.06.03-.09s0-.03 0-.06l-.03-.03c-.37-.184-2.185-1.077-2.522-1.2z"/></svg>
                                                <span class="text-[10px] font-black text-emerald-700">Whats</span>
                                            </a>
                                        </template>
                                        <template x-if="paciente.email_responsavel">
                                            <a :href="'mailto:' + paciente.email_responsavel" class="bg-white p-2 rounded-xl flex items-center justify-center gap-1 shadow-sm border border-slate-100 active:scale-95 transition-transform">
                                                <svg class="w-4 h-4 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                                                <span class="text-[10px] font-black text-blue-700">E-mail</span>
                                            </a>
                                        </template>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <template x-if="ultimaAnamnese && ultimaAnamnese.dados">
                            <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                                <div class="flex items-center justify-between mb-4 border-b border-slate-50 pb-3">
                                    <h3 class="text-xs font-black text-slate-800 uppercase flex items-center gap-2 tracking-wide">
                                        <svg class="w-4 h-4 text-orange-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                                        Mapa Clínico
                                    </h3>
                                    <span class="text-[9px] text-slate-400 font-bold uppercase" x-text="ultimaAnamnese.data"></span>
                                </div>
                                
                                <div class="space-y-4">
                                    <template x-if="ultimaAnamnese.dados.comportamento && ultimaAnamnese.dados.comportamento.length > 0">
                                        <div>
                                            <span class="text-[9px] font-bold text-slate-400 uppercase tracking-wider block mb-1.5">Comportamento</span>
                                            <div class="flex flex-wrap gap-1.5">
                                                <template x-for="item in ultimaAnamnese.dados.comportamento">
                                                    <span class="bg-red-50 text-red-700 border border-red-100 text-[10px] font-bold px-2 py-1 rounded-lg leading-tight shadow-sm" x-text="item.split(':')[0]"></span>
                                                </template>
                                            </div>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </template>

                    </aside>

                    <section class="w-full md:w-2/3 space-y-8">
                        <div>
                            <h3 class="text-sm font-black text-slate-500 mb-3 px-1 uppercase tracking-widest">Área de Intervenção</h3>
                            <div class="grid grid-cols-2 gap-3 md:gap-4">
                                <button @click="window.location.href = '/paciente/' + paciente.id + '/anamnese'" class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 group transition-all hover:-translate-y-1">
                                    <div class="w-14 h-14 bg-orange-50 text-orange-500 rounded-2xl flex items-center justify-center group-hover:bg-orange-500 group-hover:text-white transition-colors rotate-3 group-hover:rotate-0 shadow-inner">
                                        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
                                    </div>
                                    <span class="font-black text-slate-700 text-xs text-center mt-3 block uppercase">1. Triagem</span>
                                </button>
                                <button @click="window.location.href = '/paciente/' + paciente.id + '/pedi'" class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 group transition-all hover:-translate-y-1">
                                    <div class="w-14 h-14 bg-blue-50 text-blue-500 rounded-2xl flex items-center justify-center group-hover:bg-blue-500 group-hover:text-white transition-colors -rotate-3 group-hover:rotate-0 shadow-inner">
                                        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                                    </div>
                                    <span class="font-black text-slate-700 text-xs text-center mt-3 block uppercase">2. Avaliação PEDI</span>
                                </button>
                                <button @click="window.location.href = '/paciente/' + paciente.id + '/observacao'" class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 group transition-all hover:-translate-y-1">
                                    <div class="w-14 h-14 bg-purple-50 text-purple-500 rounded-2xl flex items-center justify-center group-hover:bg-purple-500 group-hover:text-white transition-colors rotate-3 group-hover:rotate-0 shadow-inner">
                                        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                                    </div>
                                    <span class="font-black text-slate-700 text-xs text-center mt-3 block uppercase">3. Obs. Clínica</span>
                                </button>
                                <button @click="window.location.href = '/paciente/' + paciente.id + '/evolucao'" class="bg-white p-5 rounded-3xl shadow-sm border border-clinica-100 group transition-all hover:-translate-y-1">
                                    <div class="w-14 h-14 bg-clinica-50 text-clinica-500 rounded-2xl flex items-center justify-center group-hover:bg-clinica-500 group-hover:text-white transition-colors -rotate-3 group-hover:rotate-0 shadow-inner">
                                        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                                    </div>
                                    <span class="font-black text-clinica-700 text-xs text-center mt-3 block uppercase">4. Evolução Diária</span>
                                </button>
                            </div>
                        </div>

                        <div>
                            <h3 class="text-sm font-black text-slate-500 mb-4 px-1 uppercase tracking-widest flex justify-between items-center">
                                Histórico de Evoluções
                                <span class="bg-slate-100 text-slate-500 text-[10px] px-2 py-1 rounded-lg" x-text="historicoEvolucoes.length + ' Registros'"></span>
                            </h3>
                            
                            <template x-if="historicoEvolucoes.length === 0">
                                <div class="p-8 bg-slate-50 border-2 border-dashed border-slate-200 rounded-3xl text-center">
                                    <svg class="mx-auto h-10 w-10 text-slate-300 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                    <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Nenhuma evolução registada ainda.</p>
                                </div>
                            </template>

                            <div class="space-y-6 border-l-2 border-slate-100 ml-3 pl-6 relative">
                                <template x-for="evo in historicoEvolucoes" :key="evo.id">
                                    <div class="relative group">
                                        <div class="absolute -left-[33px] top-2 w-4 h-4 rounded-full border-4 border-white shadow-sm"
                                             :class="evo.status === 'Realizado' ? 'bg-emerald-500' : (evo.status === 'Faltou' ? 'bg-red-500' : 'bg-slate-400')"></div>
                                        
                                        <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 group-hover:border-slate-200 transition-colors">
                                            
                                            <div class="flex justify-between items-start mb-3 border-b border-slate-50 pb-3">
                                                <div>
                                                    <span class="text-sm font-black text-slate-800" x-text="evo.data_hora"></span>
                                                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest" x-text="evo.tipo_sessao"></p>
                                                </div>
                                                <span class="text-[9px] font-black px-2 py-1 rounded-md uppercase tracking-wider"
                                                      :class="evo.status === 'Realizado' ? 'bg-emerald-50 text-emerald-700' : (evo.status === 'Faltou' ? 'bg-red-50 text-red-700' : 'bg-slate-100 text-slate-600')"
                                                      x-text="evo.status"></span>
                                            </div>

                                            <template x-if="evo.status === 'Realizado' && evo.micro_metas && (evo.micro_metas.autocuidado || evo.micro_metas.mobilidade || evo.micro_metas.funcao_social)">
                                                <div class="flex flex-wrap gap-2 mb-4">
                                                    <template x-if="evo.micro_metas.autocuidado !== null">
                                                        <span class="flex items-center gap-1.5 text-[10px] font-bold px-2 py-1 rounded-lg border" :class="getEstiloGAS(evo.micro_metas.autocuidado)">
                                                            <span class="uppercase tracking-widest opacity-80">Autocuidado</span>
                                                            <span class="text-xs font-black" x-text="evo.micro_metas.autocuidado > 0 ? '+' + evo.micro_metas.autocuidado : evo.micro_metas.autocuidado"></span>
                                                        </span>
                                                    </template>
                                                    <template x-if="evo.micro_metas.mobilidade !== null">
                                                        <span class="flex items-center gap-1.5 text-[10px] font-bold px-2 py-1 rounded-lg border" :class="getEstiloGAS(evo.micro_metas.mobilidade)">
                                                            <span class="uppercase tracking-widest opacity-80">Mobilidade</span>
                                                            <span class="text-xs font-black" x-text="evo.micro_metas.mobilidade > 0 ? '+' + evo.micro_metas.mobilidade : evo.micro_metas.mobilidade"></span>
                                                        </span>
                                                    </template>
                                                    <template x-if="evo.micro_metas.funcao_social !== null">
                                                        <span class="flex items-center gap-1.5 text-[10px] font-bold px-2 py-1 rounded-lg border" :class="getEstiloGAS(evo.micro_metas.funcao_social)">
                                                            <span class="uppercase tracking-widest opacity-80">Social</span>
                                                            <span class="text-xs font-black" x-text="evo.micro_metas.funcao_social > 0 ? '+' + evo.micro_metas.funcao_social : evo.micro_metas.funcao_social"></span>
                                                        </span>
                                                    </template>
                                                </div>
                                            </template>

                                            <template x-if="evo.status === 'Realizado' && evo.micro_metas && evo.micro_metas.atividades && evo.micro_metas.atividades.length > 0">
                                                <div class="mb-4">
                                                    <span class="block text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Atividades (Tags)</span>
                                                    <div class="flex flex-wrap gap-1.5">
                                                        <template x-for="ativ in evo.micro_metas.atividades">
                                                            <span class="bg-clinica-50 text-clinica-700 text-[10px] font-bold px-2 py-1 rounded-md" x-text="ativ"></span>
                                                        </template>
                                                    </div>
                                                </div>
                                            </template>

                                            <template x-if="evo.evolucao_texto">
                                                <p class="text-sm font-semibold text-slate-600 leading-relaxed whitespace-pre-line" x-text="evo.evolucao_texto"></p>
                                            </template>
                                            <template x-if="!evo.evolucao_texto && evo.status === 'Realizado'">
                                                <p class="text-sm font-semibold text-slate-400 italic">Sem anotações de texto adicionais.</p>
                                            </template>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>
                        </section>
                </div>
            </template>
        </main>
    </div>

    <script>
        function perfilPaciente(id) {
            return {
                pacienteId: id,
                paciente: null,
                avaliacoesPedi: [],
                ultimaAnamnese: null,
                historicoEvolucoes: [], // NOVO: Guarda o histórico
                carregando: true,
                carregarDados() {
                    Promise.all([
                        fetch('/api/pacientes/' + this.pacienteId).then(res => res.json()),
                        fetch('/api/pedi/' + this.pacienteId).then(res => res.json()),
                        fetch('/api/anamnese/' + this.pacienteId).then(res => res.json()),
                        fetch('/api/consultas/paciente/' + this.pacienteId).then(res => res.json()) // BUSCA O HISTÓRICO
                    ]).then(([dadosPaciente, dadosPedi, dadosAnamnese, dadosConsultas]) => {
                        this.paciente = dadosPaciente;
                        this.avaliacoesPedi = Array.isArray(dadosPedi) ? dadosPedi : [];
                        if (Array.isArray(dadosAnamnese) && dadosAnamnese.length > 0) {
                            this.ultimaAnamnese = dadosAnamnese[0];
                        }
                        this.historicoEvolucoes = Array.isArray(dadosConsultas) ? dadosConsultas : [];
                        this.carregando = false;
                    }).catch(err => {
                        console.error('Erro ao carregar prontuário:', err);
                        this.carregando = false;
                    });
                },
                calcularIdade(dataNasc) {
                    if (!dataNasc) return 'Idade não informada';
                    const hoje = new Date();
                    const nascimento = new Date(dataNasc);
                    let idade = hoje.getFullYear() - nascimento.getFullYear();
                    const mes = hoje.getMonth() - nascimento.getMonth();
                    if (mes < 0 || (mes === 0 && hoje.getDate() < nascimento.getDate())) { idade--; }
                    return idade + (idade === 1 ? ' ano' : ' anos');
                },
                // NOVO: Função para colorir as notas GAS no histórico
                getEstiloGAS(valor) {
                    if (valor === -2) return 'bg-rose-50 text-rose-700 border-rose-200';
                    if (valor === -1) return 'bg-orange-50 text-orange-700 border-orange-200';
                    if (valor === 0) return 'bg-slate-100 text-slate-600 border-slate-200';
                    if (valor === 1) return 'bg-clinica-50 text-clinica-600 border-clinica-200';
                    if (valor === 2) return 'bg-clinica-100 text-clinica-800 border-clinica-300';
                    return 'bg-slate-50 text-slate-500 border-slate-100';
                }
            }
        }
    </script>
</body>
</html>
