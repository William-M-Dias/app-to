<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Prontuário | APP-TO</title>

    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/logo_appto_oficial.png') }}?v=2">
    <link rel="shortcut icon" href="{{ url_for('static', filename='img/logo_appto_oficial.png') }}?v=2">

    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { 
                extend: { 
                    fontFamily: { sans: ['Nunito', 'sans-serif'] },
                    colors: { 
                        clinica: { 50: '#f0fdfa', 100: '#ccfbf1', 500: '#14b8a6', 600: '#0d9488', 900: '#134e4a' } 
                    } 
                } 
            }
        }
    </script>
    <style>
        body { background-color: #f8fafc; overscroll-behavior-y: contain; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

        /* ANIMAÇÕES DO FUNDO LÚDICO (EDIÇÃO PREMIUM) */
        @keyframes flutuar {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(15deg); }
        }
        @keyframes flutuarInverso {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(30px) rotate(-15deg); }
        }
        @keyframes pulsar {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.1) rotate(5deg); }
        }
        .anim-flutuar-1 { animation: flutuar 8s ease-in-out infinite; }
        .anim-flutuar-2 { animation: flutuarInverso 10s ease-in-out infinite 1s; }
        .anim-flutuar-3 { animation: flutuar 12s ease-in-out infinite 2s; }
        .anim-flutuar-4 { animation: flutuarInverso 9s ease-in-out infinite 3s; }
        .anim-flutuar-5 { animation: pulsar 7s ease-in-out infinite 0.5s; }
        .anim-flutuar-6 { animation: flutuar 11s ease-in-out infinite 1.5s; }
        .anim-flutuar-7 { animation: flutuarInverso 13s ease-in-out infinite 0.2s; }
    </style>
</head>
<body class="text-slate-800 antialiased relative min-h-screen" x-data="perfilPaciente({{ paciente_id }})" x-init="carregarDados()">

    <div class="fixed inset-0 pointer-events-none z-0 overflow-hidden opacity-15">
        <svg class="absolute top-10 right-10 w-48 h-48 text-rose-500 anim-flutuar-1" fill="currentColor" viewBox="0 0 24 24"><path d="M12,2A7,7,0,0,0,5,9c0,5.25,7,13,7,13s7-7.75,7-13A7,7,0,0,0,12,2Z"/></svg>
        <svg class="absolute top-1/4 -left-10 w-56 h-56 text-blue-500 anim-flutuar-2" fill="currentColor" viewBox="0 0 24 24"><path d="M19,9H17V7A1,1,0,0,0,15,7V9H9V7A1,1,0,0,0,7,7V9H5a3,3,0,0,0-3,3v7a3,3,0,0,0,3,3H19a3,3,0,0,0,3-3V12A3,3,0,0,0,19,9Zm1,10a1,1,0,0,1-1,1H5a1,1,0,0,1-1-1V12a1,1,0,0,1,1-1H19a1,1,0,0,1,1,1Z"/></svg>
        <svg class="absolute bottom-10 right-0 w-64 h-64 text-emerald-500 anim-flutuar-3" fill="currentColor" viewBox="0 0 24 24"><path d="M20.5,10.5H18V8a2,2,0,0,0-2-2H13.5a2,2,0,0,1-4,0H7A2,2,0,0,0,5,8v2.5a2,2,0,0,1,0,4V17a2,2,0,0,0,2,2h2.5a2,2,0,0,1,4,0H16a2,2,0,0,0,2-2V14.5a2,2,0,0,1,2.5-4h0A2,2,0,0,0,20.5,10.5Z"/></svg>
        <svg class="absolute top-1/3 right-20 w-32 h-32 text-amber-400 anim-flutuar-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12,2l3.09,6.26L22,9.27l-5,4.87,1.18,6.88L12,17.77l-6.18,3.25L7,14.14,2,9.27l6.91-1.01L12,2Z"/></svg>
        <svg class="absolute bottom-32 left-1/3 w-40 h-40 text-purple-400 anim-flutuar-4" fill="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg>
        <svg class="absolute top-20 left-20 w-44 h-44 text-sky-400 anim-flutuar-6" fill="currentColor" viewBox="0 0 24 24"><path d="M17.5,19H6.5A5.5,5.5,0,0,1,6.5,8h.18a7,7,0,0,1,13.27,2.23A4.5,4.5,0,0,1,17.5,19Z"/></svg>
        <svg class="absolute bottom-10 left-10 w-36 h-36 text-teal-500 anim-flutuar-7" fill="currentColor" viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"/><path d="M9 16V8l3 8 3-8v8"/></svg>
    </div>

    <div class="max-w-5xl mx-auto min-h-screen bg-white md:shadow-2xl md:shadow-slate-200/50 md:border-x border-slate-100 relative z-10 pb-20 md:pb-10">

        <header class="bg-clinica-600 text-white p-4 sticky top-0 z-40 shadow-md relative overflow-hidden">
            <div class="absolute top-0 right-0 w-32 h-32 bg-white opacity-5 rounded-full -mr-10 -mt-10 pointer-events-none"></div>
            <div class="flex items-center justify-between relative z-10">
                <div class="flex items-center gap-3">
                    <a href="/" class="p-2 -ml-2 hover:bg-white/20 rounded-full transition-colors active:scale-95">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                    </a>
                    <h1 class="text-xl font-black uppercase tracking-widest drop-shadow-sm">Prontuário</h1>
                </div>
                
                <div class="w-10 h-10 bg-white rounded-lg flex items-center justify-center shadow-inner overflow-hidden border border-white/20">
                    <img src="{{ url_for('static', filename='img/logo_appto_oficial.png') }}?v=2" alt="Logo" class="w-full h-full object-cover scale-150">
                </div>
            </div>
        </header>

        <main class="p-4 md:p-6">
            <template x-if="carregando">
                <div class="flex flex-col items-center justify-center py-20">
                    <div class="animate-spin rounded-full h-12 w-12 border-b-4 border-clinica-600 mb-4"></div>
                    <p class="text-sm font-bold text-slate-400 uppercase tracking-widest animate-pulse">A aceder ao dossiê...</p>
                </div>
            </template>

            <template x-if="!carregando && paciente">
                <div class="flex flex-col md:flex-row gap-6 items-start">
                    
                    <aside class="w-full md:w-1/3 flex flex-col gap-4 md:sticky md:top-24">
                        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 relative overflow-hidden text-center group">
                            <div class="absolute top-0 right-0 w-32 h-32 bg-clinica-50 rounded-full -mr-10 -mt-10 opacity-50 pointer-events-none"></div>
                            
                            <button @click="abrirEdicao()" class="absolute top-4 right-4 p-2 bg-white border border-slate-100 text-slate-400 hover:text-clinica-600 rounded-full shadow-sm hover:shadow-md transition-all active:scale-95 z-20" title="Editar Paciente">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                            </button>
                            
                            <div class="relative mx-auto w-20 h-20 mb-4 group cursor-pointer" @click="$refs.fotoInput.click()">
                                <div class="w-full h-full rounded-full bg-clinica-100 flex items-center justify-center text-clinica-600 font-black text-3xl shadow-inner uppercase overflow-hidden border-4 border-white group-hover:border-clinica-500 transition-all relative z-10">
                                    <template x-if="paciente.foto_url">
                                        <img :src="paciente.foto_url" class="w-full h-full object-cover">
                                    </template>
                                    <template x-if="!paciente.foto_url">
                                        <span x-text="paciente.nome.charAt(0)"></span>
                                    </template>
                                    
                                    <div class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                                        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path></svg>
                                    </div>
                                </div>
                                
                                <input type="file" x-ref="fotoInput" class="hidden" accept="image/*" @change="uploadFoto($event)">
                                
                                <div x-show="subindoFoto" class="absolute inset-0 bg-white/80 rounded-full flex items-center justify-center z-20">
                                    <div class="animate-spin rounded-full h-6 w-6 border-b-2 border-clinica-600"></div>
                                </div>
                            </div>
                            
                            <h2 class="font-black text-xl text-slate-800 leading-tight mb-1 relative z-10" x-text="paciente.nome"></h2>
                            <p class="text-clinica-600 font-bold text-sm mb-5 relative z-10" x-text="calcularIdade(paciente.data_nascimento)"></p>
                            
                            <div class="text-left space-y-4 pt-4 border-t border-slate-50 relative z-10">
                                <div>
                                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-0.5">Diagnóstico Base</span>
                                    <span class="text-sm font-black text-slate-700" x-text="paciente.diagnostico || 'Não informado'"></span>
                                </div>
                                
                                <div x-data="{ mostrarQueixa: false }" class="bg-slate-50 p-3 rounded-2xl border border-slate-100 shadow-sm">
                                    <button @click="mostrarQueixa = !mostrarQueixa" type="button" class="w-full flex justify-between items-center focus:outline-none group">
                                        <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest group-hover:text-clinica-600 transition-colors">Motivo / Queixa Principal</span>
                                        <div class="w-6 h-6 rounded-full bg-white border border-slate-200 flex items-center justify-center text-slate-400 group-hover:border-clinica-300 group-hover:text-clinica-600 shadow-sm transition-all">
                                            <svg x-show="!mostrarQueixa" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v12m-6-6h12"></path></svg>
                                            <svg x-show="mostrarQueixa" style="display: none;" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 12H4"></path></svg>
                                        </div>
                                    </button>
                                    <div x-show="mostrarQueixa" x-transition style="display: none;" class="mt-3 pt-3 border-t border-slate-200 max-h-48 overflow-y-auto custom-scrollbar pr-2">
                                        <p class="text-[13px] font-semibold text-slate-600 leading-relaxed whitespace-pre-line text-justify" x-text="paciente.queixa_principal || 'Nenhuma queixa registada.'"></p>
                                    </div>
                                </div>

                                <div class="mt-2 p-4 bg-slate-50 rounded-2xl border border-slate-100">
                                    <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest block mb-2 border-b border-slate-200 pb-1">Responsável e Contato</span>
                                    <p class="text-xs font-black text-slate-700 mb-3 truncate" x-text="paciente.nome_responsavel || 'Não informado'"></p>
                                    <div class="grid grid-cols-2 gap-2">
                                        <template x-if="paciente.telefone_responsavel">
                                            <a :href="'https://wa.me/55' + paciente.telefone_responsavel.replace(/\D/g, '')" target="_blank" class="bg-white p-2 rounded-xl flex items-center justify-center gap-1 shadow-sm border border-slate-100 active:scale-95 transition-transform">
                                                <svg class="w-4 h-4 text-emerald-500" fill="currentColor" viewBox="0 0 24 24"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946C.161 5.383 5.513.031 12.066.031c3.172.001 6.156 1.237 8.401 3.484 2.246 2.248 3.481 5.232 3.481 8.402 0 6.553-5.352 11.905-11.903 11.905-2.008 0-3.974-.508-5.716-1.472L0 24zm6.594-2.22c1.614.957 3.518 1.463 5.462 1.463 5.86 0 10.626-4.766 10.627-10.625 0-2.839-1.106-5.509-3.114-7.518-2.008-2.008-4.678-3.113-7.516-3.113-5.861 0-10.627 4.767-10.627 10.627-.001 2.032.58 4.01 1.68 5.719L2.013 22.01l4.638-1.23zM16.96 14.18c-.37-.184-2.185-1.077-2.522-1.2-.338-.122-.585-.184-.83.184-.247.37-.954 1.2-.172 1.29.184.09 1.144.37 1.29.37.184 0 .338-.03.46-.184.123-.153.37-.46.37-.46s.338-.4.492-.122c.184.277.83 1.35.83 1.35l.03.03s.03.03.06.06c.03.03.06.03.09.06s.03.03.06.06l.03.03c.37.184.585.308.738.4.154.09.277.153.37-.184.09-.37.37-1.35.37-1.35l.03-.03s.03-.03.03-.06c0-.03.03-.06.03-.09s0-.03 0-.06l-.03-.03c-.37-.184-2.185-1.077-2.522-1.2z"/></svg>
                                                <span class="text-[10px] font-black text-emerald-700">Whats</span>
                                            </a>
                                        </template>
                                        <template x-if="paciente.email_responsavel">
                                            <a :href="'mailto:' + paciente.email_responsavel" class="bg-white p-2 rounded-xl flex items-center justify-center gap-1 shadow-sm border border-slate-100 active:scale-95 transition-transform">
                                                <svg class="w-4 h-4 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                                                <span class="text-[10px] font-black text-blue-700">E-mail</span>
                                            </a>
                                        </template>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <template x-if="ultimaAnamnese && ultimaAnamnese.dados">
                            <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                                <div class="flex items-center justify-between mb-4 border-b border-slate-50 pb-3">
                                    <h3 class="text-xs font-black text-slate-800 uppercase flex items-center gap-2 tracking-wide">
                                        <svg class="w-4 h-4 text-orange-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                                        Mapa Clínico
                                    </h3>
                                    <span class="text-[9px] text-slate-400 font-bold uppercase" x-text="ultimaAnamnese.data"></span>
                                </div>
                                <div class="space-y-4">
                                    <template x-if="ultimaAnamnese.dados.comportamento && ultimaAnamnese.dados.comportamento.length > 0">
                                        <div>
                                            <span class="text-[9px] font-bold text-slate-400 uppercase tracking-wider block mb-1.5">Comportamento</span>
                                            <div class="flex flex-wrap gap-1.5">
                                                <template x-for="item in ultimaAnamnese.dados.comportamento">
                                                    <span class="bg-red-50 text-red-700 border border-red-100 text-[10px] font-bold px-2 py-1 rounded-lg leading-tight shadow-sm" x-text="item.split(':')[0]"></span>
                                                </template>
                                            </div>
                                        </div>
                                    </template>
                                    
                                    <template x-if="ultimaAnamnese.dados.observacoes">
                                        <div class="mt-4 pt-4 border-t border-slate-50">
                                            <span class="text-[9px] font-bold text-slate-400 uppercase tracking-wider block mb-1.5">Observações Clínicas</span>
                                            <p class="text-xs font-semibold text-slate-600 leading-relaxed whitespace-pre-line" x-text="ultimaAnamnese.dados.observacoes"></p>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </template>

                        <button @click="apagarPaciente()" class="w-full p-4 bg-red-50 text-red-500 hover:bg-red-500 hover:text-white border border-red-100 hover:border-red-500 rounded-3xl text-xs font-black uppercase tracking-widest transition-colors flex items-center justify-center gap-2 group shadow-sm">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            Excluir Prontuário
                        </button>

                    </aside>

                    <section class="w-full md:w-2/3 space-y-8 relative z-10">
                        <div>
                            <h3 class="text-sm font-black text-slate-500 mb-3 px-1 uppercase tracking-widest">Área de Intervenção</h3>
                            <div class="grid grid-cols-2 gap-3 md:gap-4">
                                <button @click="window.location.href = '/paciente/' + paciente.id + '/anamnese'" class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 group transition-all hover:-translate-y-1 hover:shadow-md">
                                    <div class="w-14 h-14 bg-orange-50 text-orange-500 rounded-2xl flex items-center justify-center group-hover:bg-orange-500 group-hover:text-white transition-colors rotate-3 group-hover:rotate-0 shadow-inner mx-auto">
                                        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
                                    </div>
                                    <span class="font-black text-slate-700 text-xs text-center mt-3 block uppercase">1. Triagem</span>
                                </button>
                                <button @click="window.location.href = '/paciente/' + paciente.id + '/pedi'" class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 group transition-all hover:-translate-y-1 hover:shadow-md">
                                    <div class="w-14 h-14 bg-blue-50 text-blue-500 rounded-2xl flex items-center justify-center group-hover:bg-blue-500 group-hover:text-white transition-colors -rotate-3 group-hover:rotate-0 shadow-inner mx-auto">
                                        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                                    </div>
                                    <span class="font-black text-slate-700 text-xs text-center mt-3 block uppercase">2. Avaliação PEDI</span>
                                </button>
                                <button @click="window.location.href = '/paciente/' + paciente.id + '/observacao'" class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 group transition-all hover:-translate-y-1 hover:shadow-md">
                                    <div class="w-14 h-14 bg-purple-50 text-purple-500 rounded-2xl flex items-center justify-center group-hover:bg-purple-500 group-hover:text-white transition-colors rotate-3 group-hover:rotate-0 shadow-inner mx-auto">
                                        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                                    </div>
                                    <span class="font-black text-slate-700 text-xs text-center mt-3 block uppercase">3. Obs. Clínica</span>
                                </button>
                                <button @click="window.location.href = '/paciente/' + paciente.id + '/evolucao'" class="bg-white p-5 rounded-3xl shadow-sm border border-clinica-100 group transition-all hover:-translate-y-1 hover:shadow-md">
                                    <div class="w-14 h-14 bg-clinica-50 text-clinica-500 rounded-2xl flex items-center justify-center group-hover:bg-clinica-500 group-hover:text-white transition-colors -rotate-3 group-hover:rotate-0 shadow-inner mx-auto">
                                        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                                    </div>
                                    <span class="font-black text-clinica-700 text-xs text-center mt-3 block uppercase">4. Evolução Diária</span>
                                </button>
                            </div>
                            
                            <button @click="window.location.href = '/paciente/' + paciente.id + '/relatorio'" class="w-full mt-4 bg-slate-800 text-white p-4 rounded-3xl shadow-sm hover:shadow-md transition-all active:scale-[0.98] flex items-center justify-center gap-2 font-black uppercase tracking-widest text-xs">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
                                Gerar Relatório Clínico (PDF)
                            </button>
                        </div>

                        <div>
                            <h3 class="text-sm font-black text-slate-500 mb-4 px-1 uppercase tracking-widest flex justify-between items-center">
                                Histórico de Evoluções
                                <span class="bg-slate-100 text-slate-500 text-[10px] px-2 py-1 rounded-lg shadow-inner" x-text="historicoEvolucoes.length + ' Registros'"></span>
                            </h3>
                            
                            <template x-if="historicoEvolucoes.length === 0">
                                <div class="p-8 bg-slate-50 border-2 border-dashed border-slate-200 rounded-3xl text-center shadow-sm">
                                    <svg class="mx-auto h-10 w-10 text-slate-300 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                    <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Nenhuma evolução registada ainda.</p>
                                </div>
                            </template>

                            <div class="space-y-6 border-l-2 border-slate-100 ml-3 pl-6 relative">
                                <template x-for="evo in historicoEvolucoes" :key="evo.id">
                                    <div class="relative group">
                                        <div class="absolute -left-[33px] top-2 w-4 h-4 rounded-full border-4 border-white shadow-sm"
                                             :class="evo.status === 'Realizado' ? 'bg-emerald-500' : (evo.status === 'Faltou' ? 'bg-red-500' : (evo.status === 'Agendado' ? 'bg-blue-400' : 'bg-slate-400'))"></div>
                                        
                                        <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 group-hover:border-slate-200 transition-colors relative">
                                            
                                            <button @click="apagarEvolucao(evo.id)" class="absolute top-4 right-4 text-slate-300 hover:text-red-500 transition-colors p-1 bg-white rounded-full hover:bg-red-50" title="Excluir Registro">
                                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                            </button>

                                            <div class="flex justify-between items-start mb-3 border-b border-slate-50 pb-3 pr-8">
                                                <div>
                                                    <span class="text-sm font-black text-slate-800" x-text="evo.data_hora"></span>
                                                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest" x-text="evo.tipo_sessao"></p>
                                                </div>
                                                <span class="text-[9px] font-black px-2 py-1 rounded-md uppercase tracking-wider"
                                                      :class="evo.status === 'Realizado' ? 'bg-emerald-50 text-emerald-700' : (evo.status === 'Faltou' ? 'bg-red-50 text-red-700' : (evo.status === 'Agendado' ? 'bg-blue-50 text-blue-700' : 'bg-slate-100 text-slate-600'))"
                                                      x-text="evo.status"></span>
                                            </div>

                                            <template x-if="evo.status === 'Realizado' && evo.micro_metas && (evo.micro_metas.autocuidado !== null || evo.micro_metas.mobilidade !== null || evo.micro_metas.funcao_social !== null)">
                                                <div class="flex flex-wrap gap-2 mb-4">
                                                    <template x-if="evo.micro_metas.autocuidado !== null">
                                                        <span class="flex items-center gap-1.5 text-[10px] font-bold px-2 py-1 rounded-lg border" :class="getEstiloGAS(evo.micro_metas.autocuidado)">
                                                            <span class="uppercase tracking-widest opacity-80">Autocuidado</span>
                                                            <span class="text-xs font-black" x-text="evo.micro_metas.autocuidado > 0 ? '+' + evo.micro_metas.autocuidado : evo.micro_metas.autocuidado"></span>
                                                        </span>
                                                    </template>
                                                    <template x-if="evo.micro_metas.mobilidade !== null">
                                                        <span class="flex items-center gap-1.5 text-[10px] font-bold px-2 py-1 rounded-lg border" :class="getEstiloGAS(evo.micro_metas.mobilidade)">
                                                            <span class="uppercase tracking-widest opacity-80">Mobilidade</span>
                                                            <span class="text-xs font-black" x-text="evo.micro_metas.mobilidade > 0 ? '+' + evo.micro_metas.mobilidade : evo.micro_metas.mobilidade"></span>
                                                        </span>
                                                    </template>
                                                    <template x-if="evo.micro_metas.funcao_social !== null">
                                                        <span class="flex items-center gap-1.5 text-[10px] font-bold px-2 py-1 rounded-lg border" :class="getEstiloGAS(evo.micro_metas.funcao_social)">
                                                            <span class="uppercase tracking-widest opacity-80">Social</span>
                                                            <span class="text-xs font-black" x-text="evo.micro_metas.funcao_social > 0 ? '+' + evo.micro_metas.funcao_social : evo.micro_metas.funcao_social"></span>
                                                        </span>
                                                    </template>
                                                </div>
                                            </template>

                                            <template x-if="evo.status === 'Realizado' && evo.micro_metas && evo.micro_metas.atividades && evo.micro_metas.atividades.length > 0">
                                                <div class="mb-4">
                                                    <span class="block text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Atividades (Tags)</span>
                                                    <div class="flex flex-wrap gap-1.5">
                                                        <template x-for="ativ in evo.micro_metas.atividades">
                                                            <span class="bg-clinica-50 text-clinica-700 text-[10px] font-bold px-2 py-1 rounded-md" x-text="ativ"></span>
                                                        </template>
                                                    </div>
                                                </div>
                                            </template>

                                            <template x-if="evo.evolucao_texto">
                                                <p class="text-sm font-semibold text-slate-600 leading-relaxed whitespace-pre-line" x-text="evo.evolucao_texto"></p>
                                            </template>
                                            <template x-if="!evo.evolucao_texto && evo.status === 'Realizado'">
                                                <p class="text-sm font-semibold text-slate-400 italic">Sem anotações adicionais.</p>
                                            </template>
                                            <template x-if="!evo.evolucao_texto && evo.status === 'Agendado'">
                                                <p class="text-sm font-semibold text-slate-400 italic">Sessão programada.</p>
                                            </template>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </section>
                </div>
            </template>
        </main>

        <footer class="mt-8 pt-8 border-t border-slate-100 pb-10 px-4 text-center">
            <div class="flex flex-col items-center gap-4">
                <div class="flex items-center justify-center gap-6 opacity-60 grayscale hover:grayscale-0 transition-all duration-500">
                    <div class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">Fiscalizado por</div>
                    <div class="flex gap-4">
                        <span class="text-[11px] font-black text-slate-500 border-2 border-slate-200 px-2 py-1 rounded-md">CREFITO-SP</span>
                        <span class="text-[11px] font-black text-slate-500 border-2 border-slate-200 px-2 py-1 rounded-md">COFITO</span>
                    </div>
                </div>

                <div class="mt-4 flex flex-col items-center gap-1">
                    <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest text-center">Tecnologia e Inovação</span>
                    <div class="flex items-center gap-2">
                        <div class="w-6 h-6 bg-slate-800 rounded-md flex items-center justify-center text-white font-black text-[10px]">V</div>
                        <span class="text-xs font-black text-slate-700 tracking-tight">VÓRTICE <span class="text-clinica-600">HUB</span></span>
                    </div>
                </div>

                <p class="text-[9px] font-bold text-slate-400 mt-4 leading-relaxed max-w-[280px] mx-auto">
                    Este prontuário digital atende às normas de Terapia Ocupacional e segurança de dados do paciente.
                </p>
            </div>
        </footer>

        <div x-show="modalEdicaoAberto" style="display: none;" class="fixed inset-0 z-[60] overflow-y-auto">
            <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
                <div x-show="modalEdicaoAberto" x-transition.opacity class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm" @click="fecharEdicao()"></div>
                <span class="hidden sm:inline-block sm:align-middle sm:h-screen">&#8203;</span>
                <div x-show="modalEdicaoAberto" x-transition.scale class="inline-block align-bottom bg-white rounded-t-3xl sm:rounded-3xl text-left overflow-hidden shadow-2xl transform transition-all sm:my-8 sm:align-middle w-full sm:max-w-lg">
                    <div class="bg-white px-6 pt-6 pb-6 text-center">
                        <div class="flex justify-between items-center mb-6">
                            <h3 class="text-xl font-black text-slate-800">Editar Paciente</h3>
                            <button @click="fecharEdicao()" class="text-slate-400 hover:text-slate-600 p-2"><svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg></button>
                        </div>
                        
                        <div class="space-y-4 max-h-[65vh] overflow-y-auto custom-scrollbar px-1 text-left">
                            <div>
                                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Nome da Criança</label>
                                <input type="text" x-model="formEdicao.nome" class="w-full p-3 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-clinica-500 outline-none text-sm font-bold">
                            </div>

                            <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100 space-y-3">
                                <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest border-b border-slate-200 pb-1">Responsáveis e Contato</p>
                                <input type="text" x-model="formEdicao.nome_responsavel" placeholder="Nome da Mãe/Pai" class="w-full p-2.5 bg-white border border-slate-200 rounded-lg text-sm font-bold outline-none">
                                <div class="grid grid-cols-2 gap-3">
                                    <input type="tel" x-model="formEdicao.telefone_responsavel" placeholder="WhatsApp" class="w-full p-2.5 bg-white border border-slate-200 rounded-lg text-sm font-bold outline-none">
                                    <input type="email" x-model="formEdicao.email_responsavel" placeholder="E-mail" class="w-full p-2.5 bg-white border border-slate-200 rounded-lg text-sm font-bold outline-none">
                                </div>
                            </div>

                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Nascimento</label>
                                    <input type="date" x-model="formEdicao.data_nascimento" class="w-full p-3 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-clinica-500 outline-none text-sm font-bold">
                                </div>
                                <div>
                                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Escolaridade</label>
                                    <select x-model="formEdicao.escolaridade" class="w-full p-3 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-clinica-500 outline-none text-sm font-bold">
                                        <option value="Creche">Creche</option>
                                        <option value="Educação Infantil">Educação Infantil</option>
                                        <option value="Fundamental I">Fundamental I</option>
                                        <option value="Fundamental II">Fundamental II</option>
                                        <option value="Não frequenta">Não frequenta</option>
                                    </select>
                                </div>
                            </div>

                            <div class="relative" x-data="{ open: false }">
                                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Diagnóstico (Laudo)</label>
                                <button type="button" @click="open = !open" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-left flex justify-between items-center focus:ring-2 focus:ring-clinica-500 outline-none">
                                    <span class="truncate text-slate-700 font-bold text-sm" x-text="diagnosticosSelecionados.length === 0 ? 'Selecione...' : diagnosticosSelecionados.join(', ')"></span>
                                    <svg class="h-5 w-5 text-slate-500 transition-transform" :class="{'rotate-180': open}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                </button>
                                <div x-show="open" @click.away="open = false" class="absolute z-20 mt-1 w-full bg-white border border-slate-200 rounded-xl shadow-xl max-h-48 overflow-y-auto custom-scrollbar p-2">
                                    <template x-for="opcao in ['TEA - Nível de Suporte 1', 'TEA - Nível de Suporte 2', 'TEA - Nível de Suporte 3', 'TDAH', 'TPS', 'TDC', 'Paralisia Cerebral', 'Síndrome de Down', 'TOD', 'Em Investigação', 'Outro']" :key="opcao">
                                        <label class="flex items-center gap-3 p-3 hover:bg-clinica-50 rounded-lg cursor-pointer">
                                            <input type="checkbox" :value="opcao" x-model="diagnosticosSelecionados" class="w-5 h-5 text-clinica-600 rounded">
                                            <span class="text-sm font-bold text-slate-700" x-text="opcao"></span>
                                        </label>
                                    </template>
                                </div>
                            </div>

                            <div>
                                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 px-1">Motivo / Queixa Principal</label>
                                <textarea x-model="formEdicao.queixa_principal" rows="3" class="w-full p-3 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-clinica-500 outline-none text-sm font-bold shadow-inner resize-none"></textarea>
                            </div>
                        </div>
                    </div>

                    <div class="bg-slate-50 px-6 py-4 flex flex-col-reverse sm:flex-row sm:justify-end gap-3 rounded-b-3xl">
                        <button type="button" @click="fecharEdicao()" class="w-full sm:w-auto px-6 py-3 font-bold text-slate-600">Cancelar</button>
                        <button type="button" @click="salvarEdicao()" class="w-full sm:w-auto px-6 py-3 rounded-xl shadow-md text-white bg-clinica-600 font-black flex items-center justify-center hover:bg-clinica-700 transition-colors">
                            Salvar Alterações
                        </button>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        function perfilPaciente(id) {
            return {
                pacienteId: id,
                paciente: null,
                avaliacoesPedi: [],
                ultimaAnamnese: null,
                historicoEvolucoes: [],
                carregando: true,
                subindoFoto: false, 
                
                modalEdicaoAberto: false,
                formEdicao: {},
                diagnosticosSelecionados: [],

                carregarDados() {
                    Promise.all([
                        fetch('/api/pacientes/' + this.pacienteId).then(res => res.json()),
                        fetch('/api/pedi/' + this.pacienteId).then(res => res.json()),
                        fetch('/api/anamnese/' + this.pacienteId).then(res => res.json()),
                        fetch('/api/consultas/paciente/' + this.pacienteId).then(res => res.json())
                    ]).then(([dadosPaciente, dadosPedi, dadosAnamnese, dadosConsultas]) => {
                        this.paciente = dadosPaciente;
                        this.avaliacoesPedi = Array.isArray(dadosPedi) ? dadosPedi : [];
                        if (Array.isArray(dadosAnamnese) && dadosAnamnese.length > 0) this.ultimaAnamnese = dadosAnamnese[0];
                        this.historicoEvolucoes = Array.isArray(dadosConsultas) ? dadosConsultas : [];
                        this.carregando = false;
                    }).catch(err => {
                        console.error('Erro ao carregar prontuário:', err);
                        this.carregando = false;
                    });
                },

                uploadFoto(event) {
                    const arquivo = event.target.files[0];
                    if (!arquivo) return;

                    this.subindoFoto = true;
                    const formData = new FormData();
                    formData.append('foto', arquivo);

                    fetch(`/api/pacientes/${this.pacienteId}/upload_foto`, {
                        method: 'POST',
                        body: formData
                    })
                    .then(res => res.json())
                    .then(data => {
                        if (data.url) {
                            this.paciente.foto_url = data.url;
                        } else {
                            alert("Erro ao processar imagem.");
                        }
                    })
                    .catch(err => alert("Erro na conexão com servidor."))
                    .finally(() => { this.subindoFoto = false; });
                },

                calcularIdade(dataNasc) {
                    if (!dataNasc) return 'Idade não informada';
                    const hoje = new Date();
                    const nascimento = new Date(dataNasc);
                    let idade = hoje.getFullYear() - nascimento.getFullYear();
                    const mes = hoje.getMonth() - nascimento.getMonth();
                    if (mes < 0 || (mes === 0 && hoje.getDate() < nascimento.getDate())) { idade--; }
                    return idade + (idade === 1 ? ' ano' : ' anos');
                },
                
                getEstiloGAS(valor) {
                    if (valor === -2) return 'bg-rose-50 text-rose-700 border-rose-200';
                    if (valor === -1) return 'bg-orange-50 text-orange-700 border-orange-200';
                    if (valor === 0) return 'bg-slate-100 text-slate-600 border-slate-200';
                    if (valor === 1) return 'bg-clinica-50 text-clinica-600 border-clinica-200';
                    if (valor === 2) return 'bg-clinica-100 text-clinica-800 border-clinica-300';
                    return 'bg-slate-50 text-slate-500 border-slate-100';
                },

                abrirEdicao() {
                    this.formEdicao = { ...this.paciente };
                    this.diagnosticosSelecionados = this.paciente.diagnostico ? this.paciente.diagnostico.split(', ') : [];
                    this.modalEdicaoAberto = true;
                },
                fecharEdicao() {
                    this.modalEdicaoAberto = false;
                },
                salvarEdicao() {
                    this.formEdicao.diagnostico = this.diagnosticosSelecionados.join(', ');
                    fetch('/api/pacientes/' + this.pacienteId, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(this.formEdicao)
                    }).then(res => {
                        if(res.ok) {
                            this.fecharEdicao();
                            this.carregando = true;
                            this.carregarDados();
                        } else { alert("Erro ao salvar."); }
                    });
                },
                apagarPaciente() {
                    if(confirm('ATENÇÃO: Tem certeza absoluta?')) {
                        fetch('/api/pacientes/' + this.pacienteId, { method: 'DELETE' })
                        .then(res => {
                            if(res.ok) window.location.href = '/';
                            else alert('Falha ao excluir.');
                        });
                    }
                },
                apagarEvolucao(idConsulta) {
                    if(confirm('Apagar esta evolução?')) {
                        fetch('/api/consultas/' + idConsulta, { method: 'DELETE' })
                        .then(res => {
                            if(res.ok) this.carregarDados();
                            else alert('Falha ao excluir.');
                        });
                    }
                }
            }
        }
    </script>
</body>
</html>
