<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Prontuário | APP-TO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { 
                extend: { 
                    fontFamily: { sans: ['Nunito', 'sans-serif'] },
                    colors: { 
                        clinica: { 50: '#f0fdfa', 100: '#ccfbf1', 500: '#14b8a6', 600: '#0d9488', 900: '#134e4a' } 
                    } 
                } 
            }
        }
    </script>
    <style>
        body { background-color: #f8fafc; overscroll-behavior-y: contain; -webkit-tap-highlight-color: transparent; }
        /* Barra de rolagem customizada e invisível na lateral esquerda */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="text-slate-800 antialiased" x-data="perfilPaciente({{ paciente_id }})" x-init="carregarDados()">

    <div class="max-w-5xl mx-auto min-h-screen bg-slate-50 md:shadow-2xl md:shadow-slate-200/50 md:border-x border-slate-100 relative pb-20 md:pb-10">

        <header class="bg-clinica-600 text-white p-4 sticky top-0 z-50 shadow-md">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <a href="/" class="p-2 -ml-2 hover:bg-white/20 rounded-full transition-colors active:scale-95">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                    </a>
                    <h1 class="text-xl font-black uppercase tracking-widest">Prontuário</h1>
                </div>
                <div class="w-8 h-8 bg-white/20 rounded-lg flex items-center justify-center backdrop-blur-sm">
                    <svg class="w-5 h-5 text-white" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 2C8.13 2 5 5.13 5 9c0 2.38 1.19 4.47 3 5.74V17c0 1.1.9 2 2 2h4c1.1 0 2-.9 2-2v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.87-3.13-7-7-7z"/>
                    </svg>
                </div>
            </div>
        </header>

        <main class="p-4 md:p-6">
            <template x-if="carregando">
                <div class="flex flex-col items-center justify-center py-20">
                    <div class="animate-spin rounded-full h-12 w-12 border-b-4 border-clinica-600 mb-4"></div>
                    <p class="text-sm font-bold text-slate-400 uppercase tracking-widest animate-pulse">A aceder ao dossiê...</p>
                </div>
            </template>

            <template x-if="!carregando && paciente">
                
                <div class="flex flex-col md:flex-row gap-6 items-start">
                    
                    <aside class="w-full md:w-1/3 flex flex-col gap-4 md:sticky md:top-24">
                        
                        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 relative overflow-hidden text-center">
                            <div class="absolute top-0 right-0 w-32 h-32 bg-clinica-50 rounded-full -mr-10 -mt-10 opacity-50 pointer-events-none"></div>
                            
                            <div class="w-20 h-20 mx-auto rounded-full bg-clinica-100 flex items-center justify-center text-clinica-600 font-black text-3xl shadow-inner uppercase mb-4 relative z-10">
                                <span x-text="paciente.nome.charAt(0)"></span>
                            </div>
                            
                            <h2 class="font-black text-xl text-slate-800 leading-tight mb-1 relative z-10" x-text="paciente.nome"></h2>
                            <p class="text-clinica-600 font-bold text-sm mb-5 relative z-10" x-text="calcularIdade(paciente.data_nascimento)"></p>
                            
                            <div class="text-left space-y-3 pt-4 border-t border-slate-50 relative z-10">
                                <div>
                                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-0.5">Diagnóstico Base</span>
                                    <span class="text-sm font-black text-slate-700" x-text="paciente.diagnostico || 'Não informado'"></span>
                                </div>
                                <div>
                                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-0.5">Motivo / Queixa</span>
                                    <span class="text-sm font-semibold text-slate-600 leading-snug" x-text="paciente.queixa_principal || 'Nenhuma queixa registada.'"></span>
                                </div>
                            </div>
                        </div>

                        <template x-if="ultimaAnamnese && ultimaAnamnese.dados">
                            <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                                <div class="flex items-center justify-between mb-4 border-b border-slate-50 pb-3">
                                    <h3 class="text-xs font-black text-slate-800 uppercase flex items-center gap-2 tracking-wide">
                                        <svg class="w-4 h-4 text-orange-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                                        Mapa Clínico
                                    </h3>
                                    <span class="text-[9px] text-slate-400 font-bold uppercase" x-text="ultimaAnamnese.data"></span>
                                </div>
                                
                                <div class="space-y-4">
                                    <template x-if="ultimaAnamnese.dados.comportamento && ultimaAnamnese.dados.comportamento.length > 0">
                                        <div>
                                            <span class="text-[9px] font-bold text-slate-400 uppercase tracking-wider block mb-1.5">Regulação e Comportamento</span>
                                            <div class="flex flex-wrap gap-1.5">
                                                <template x-for="item in ultimaAnamnese.dados.comportamento">
                                                    <span class="bg-red-50 text-red-700 border border-red-100 text-[10px] font-bold px-2 py-1 rounded-lg leading-tight shadow-sm" x-text="item.split(':')[0]"></span>
                                                </template>
                                            </div>
                                        </div>
                                    </template>

                                    <template x-if="ultimaAnamnese.dados.sensorial && ultimaAnamnese.dados.sensorial.length > 0">
                                        <div>
                                            <span class="text-[9px] font-bold text-slate-400 uppercase tracking-wider block mb-1.5">Perfil Sensorial</span>
                                            <div class="flex flex-wrap gap-1.5">
                                                <template x-for="item in ultimaAnamnese.dados.sensorial">
                                                    <span class="bg-emerald-50 text-emerald-700 border border-emerald-100 text-[10px] font-bold px-2 py-1 rounded-lg leading-tight shadow-sm" x-text="item"></span>
                                                </template>
                                            </div>
                                        </div>
                                    </template>
                                    
                                    <template x-if="ultimaAnamnese.dados.avds && ultimaAnamnese.dados.avds.length > 0">
                                        <div>
                                            <span class="text-[9px] font-bold text-slate-400 uppercase tracking-wider block mb-1.5">Vida Diária (AVDs)</span>
                                            <div class="flex flex-wrap gap-1.5">
                                                <template x-for="item in ultimaAnamnese.dados.avds">
                                                    <span class="bg-blue-50 text-blue-700 border border-blue-100 text-[10px] font-bold px-2 py-1 rounded-lg leading-tight shadow-sm" x-text="item"></span>
                                                </template>
                                            </div>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </template>
                    </aside>

                    <section class="w-full md:w-2/3 space-y-8">
                        
                        <div>
                            <h3 class="text-sm font-black text-slate-500 mb-3 px-1 uppercase tracking-widest">Área de Intervenção</h3>
                            <div class="grid grid-cols-2 gap-3 md:gap-4">
                                
                                <button @click="window.location.href = '/paciente/' + paciente.id + '/anamnese'" class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 text-left hover:-translate-y-1 hover:shadow-md transition-all duration-200 flex flex-col items-center justify-center gap-3 aspect-square md:aspect-auto md:h-36 group">
                                    <div class="w-14 h-14 bg-orange-50 text-orange-500 rounded-2xl flex items-center justify-center group-hover:bg-orange-500 group-hover:text-white transition-colors rotate-3 group-hover:rotate-0">
                                        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
                                    </div>
                                    <span class="font-black text-slate-700 text-xs text-center leading-tight uppercase">1. Triagem</span>
                                </button>

                                <button @click="window.location.href = '/paciente/' + paciente.id + '/pedi'" class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 text-left hover:-translate-y-1 hover:shadow-md transition-all duration-200 flex flex-col items-center justify-center gap-3 aspect-square md:aspect-auto md:h-36 group">
                                    <div class="w-14 h-14 bg-blue-50 text-blue-500 rounded-2xl flex items-center justify-center group-hover:bg-blue-500 group-hover:text-white transition-colors -rotate-3 group-hover:rotate-0">
                                        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                                    </div>
                                    <span class="font-black text-slate-700 text-xs text-center leading-tight uppercase">2. Avaliação PEDI</span>
                                </button>

                                <button @click="window.location.href = '/paciente/' + paciente.id + '/observacao'" class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 text-left hover:-translate-y-1 hover:shadow-md transition-all duration-200 flex flex-col items-center justify-center gap-3 aspect-square md:aspect-auto md:h-36 group">
                                    <div class="w-14 h-14 bg-purple-50 text-purple-500 rounded-2xl flex items-center justify-center group-hover:bg-purple-500 group-hover:text-white transition-colors rotate-3 group-hover:rotate-0">
                                        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                                    </div>
                                    <span class="font-black text-slate-700 text-xs text-center leading-tight uppercase">3. Obs. Clínica</span>
                                </button>

                                <button @click="window.location.href = '/paciente/' + paciente.id + '/evolucao'" class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 text-left hover:-translate-y-1 hover:shadow-md transition-all duration-200 flex flex-col items-center justify-center gap-3 aspect-square md:aspect-auto md:h-36 group border-emerald-100">
                                    <div class="w-14 h-14 bg-emerald-50 text-emerald-500 rounded-2xl flex items-center justify-center group-hover:bg-emerald-500 group-hover:text-white transition-colors -rotate-3 group-hover:rotate-0 shadow-sm">
                                        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                                    </div>
                                    <span class="font-black text-emerald-700 text-xs text-center leading-tight uppercase">4. Evolução Diária</span>
                                </button>
                            </div>
                        </div>

                        <div>
                            <h3 class="text-sm font-black text-slate-500 mb-3 px-1 uppercase tracking-widest">Evolução Quantitativa</h3>
                            <div class="space-y-4">
                                <template x-for="ava in avaliacoesPedi" :key="ava.id">
                                    <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 hover:border-blue-100 transition-colors">
                                        <div class="flex justify-between items-center mb-4 pb-3 border-b border-slate-50">
                                            <span class="text-xs font-black text-slate-500 flex items-center gap-2">
                                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                                                <span x-text="ava.data_avaliacao"></span>
                                            </span>
                                            <span class="bg-slate-100 text-slate-600 text-[10px] font-black px-3 py-1 rounded-lg uppercase tracking-wider" x-text="ava.assistencia_cuidador"></span>
                                        </div>
                                        <div class="space-y-4">
                                            <div>
                                                <div class="flex justify-between items-end mb-1">
                                                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Autocuidado</span>
                                                    <span class="text-xs font-black text-blue-600" x-text="ava.score_autocuidado + '%'"></span>
                                                </div>
                                                <div class="w-full bg-slate-100 h-2.5 rounded-full overflow-hidden shadow-inner">
                                                    <div class="bg-blue-500 h-full rounded-full transition-all duration-1000" :style="'width: ' + ava.score_autocuidado + '%'"></div>
                                                </div>
                                            </div>
                                            <div>
                                                <div class="flex justify-between items-end mb-1">
                                                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Mobilidade</span>
                                                    <span class="text-xs font-black text-emerald-600" x-text="ava.score_mobilidade + '%'"></span>
                                                </div>
                                                <div class="w-full bg-slate-100 h-2.5 rounded-full overflow-hidden shadow-inner">
                                                    <div class="bg-emerald-500 h-full rounded-full transition-all duration-1000" :style="'width: ' + ava.score_mobilidade + '%'"></div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </template>
                                <template x-if="avaliacoesPedi.length === 0">
                                    <div class="p-8 bg-slate-50 border-2 border-dashed border-slate-200 rounded-3xl text-center">
                                        <svg class="mx-auto h-10 w-10 text-slate-300 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                                        <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Nenhuma avaliação PEDI registada.</p>
                                    </div>
                                </template>
                            </div>
                        </div>

                    </section>
                </div>
            </template>
        </main>
    </div>

    <script>
        function perfilPaciente(id) {
            return {
                pacienteId: id,
                paciente: null,
                avaliacoesPedi: [],
                ultimaAnamnese: null,
                carregando: true,

                carregarDados() {
                    Promise.all([
                        fetch('/api/pacientes/' + this.pacienteId).then(res => res.json()),
                        fetch('/api/pedi/' + this.pacienteId).then(res => res.json()),
                        fetch('/api/anamnese/' + this.pacienteId).then(res => res.json())
                    ]).then(([dadosPaciente, dadosPedi, dadosAnamnese]) => {
                        this.paciente = dadosPaciente;
                        this.avaliacoesPedi = Array.isArray(dadosPedi) ? dadosPedi : [];
                        
                        if (Array.isArray(dadosAnamnese) && dadosAnamnese.length > 0) {
                            this.ultimaAnamnese = dadosAnamnese[0];
                        }
                        
                        this.carregando = false;
                    }).catch(err => {
                        console.error('Erro ao carregar prontuário:', err);
                        this.carregando = false;
                    });
                },

                calcularIdade(dataNasc) {
                    if (!dataNasc) return 'Idade não informada';
                    const hoje = new Date();
                    const nascimento = new Date(dataNasc);
                    let idade = hoje.getFullYear() - nascimento.getFullYear();
                    const mes = hoje.getMonth() - nascimento.getMonth();
                    if (mes < 0 || (mes === 0 && hoje.getDate() < nascimento.getDate())) {
                        idade--;
                    }
                    return idade + (idade === 1 ? ' ano' : ' anos');
                }
            }
        }
    </script>
</body>
</html>
